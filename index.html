<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocean House - Even Seasonal Layout</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  #bg-back {
    position: fixed;
    inset: 0;
    background: url("sea_bg.png") center center / cover no-repeat;
    z-index: 0;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
    z-index: 4;
  }

  #ocean-front {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    clip-path: inset(49% 0 0 0);
    background:
      linear-gradient(
        to bottom,
        rgba(255,255,255,0.06) 0%,
        rgba(140,210,245,0.08) 20%,
        rgba(55,125,190,0.10) 58%,
        rgba(10,45,95,0.14) 100%
      );
    mix-blend-mode: screen;
  }

  #ocean-front::before {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: -2%;
    height: 18%;
    background:
      linear-gradient(
        to bottom,
        rgba(255,255,255,0.14) 0%,
        rgba(160,220,255,0.10) 28%,
        rgba(60,130,190,0.06) 55%,
        rgba(10,45,90,0.00) 100%
      );
    mix-blend-mode: screen;
    filter: blur(8px);
  }

  #water-shimmer {
    position: fixed;
    left: 0;
    right: 0;
    top: 49%;
    bottom: 0;
    z-index: 3;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.18), rgba(255,255,255,0) 38%),
      radial-gradient(ellipse at 70% 18%, rgba(255,255,255,0.10), rgba(255,255,255,0) 34%),
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.02) 3px,
        rgba(255,255,255,0.00) 8px,
        rgba(0,0,0,0.00) 15px
      );
    opacity: 0.55;
    mix-blend-mode: screen;
    animation: shimmerMove 7s linear infinite;
    filter: blur(1.5px);
  }

  @keyframes shimmerMove {
    0%   { transform: translateY(0) scaleY(1); }
    50%  { transform: translateY(8px) scaleY(1.02); }
    100% { transform: translateY(0) scaleY(1); }
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="bg-back"></div>
<div id="ocean-front"></div>
<div id="water-shimmer"></div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2.7, 14);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.target.set(0, -1.15, -6.2);

/* ==========
   ライト
========== */
scene.add(new THREE.AmbientLight(0xffffff, 1.42));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.75);
dirLight.position.set(8, 11, 9);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xdff4ff, 0.90);
fillLight.position.set(-8, 5, -6);
scene.add(fillLight);

/* ==========
   ワールド
========== */
const world = new THREE.Group();
world.position.set(0, -0.95, -6.25);
scene.add(world);

/* ==========
   土台
========== */
const base = new THREE.Mesh(
  new THREE.CylinderGeometry(2.45, 2.9, 0.76, 64),
  new THREE.MeshStandardMaterial({
    color: 0x8c6d4a,
    roughness: 0.96
  })
);
base.position.set(0, -4.18, 0);
world.add(base);

const innerGround = new THREE.Mesh(
  new THREE.CircleGeometry(2.38, 64),
  new THREE.MeshStandardMaterial({
    color: 0x7fb36a,
    roughness: 1
  })
);
innerGround.rotation.x = -Math.PI / 2;
innerGround.position.set(0, -3.78, 0);
world.add(innerGround);

/* ==========
   家
========== */
const houseGroup = new THREE.Group();
houseGroup.position.set(0, -3.55, 0);
world.add(houseGroup);

const walls = new THREE.Mesh(
  new THREE.BoxGeometry(1.72, 1.26, 1.72),
  new THREE.MeshStandardMaterial({
    color: 0xf6eee3,
    roughness: 0.95
  })
);
walls.position.y = 0.76;
houseGroup.add(walls);

const roof = new THREE.Mesh(
  new THREE.ConeGeometry(1.30, 1.05, 4),
  new THREE.MeshStandardMaterial({
    color: 0xa64b38,
    roughness: 0.9
  })
);
roof.position.y = 1.82;
roof.rotation.y = Math.PI / 4;
houseGroup.add(roof);

const door = new THREE.Mesh(
  new THREE.BoxGeometry(0.36, 0.68, 0.05),
  new THREE.MeshStandardMaterial({
    color: 0x6d4a30,
    roughness: 0.9
  })
);
door.position.set(0, 0.38, 0.88);
houseGroup.add(door);

const windowMat = new THREE.MeshStandardMaterial({
  color: 0xd6f3ff,
  emissive: 0xffdc94,
  emissiveIntensity: 0.42,
  transparent: true,
  opacity: 0.96
});

const windowL = new THREE.Mesh(
  new THREE.BoxGeometry(0.26, 0.26, 0.04),
  windowMat
);
windowL.position.set(-0.46, 0.83, 0.88);
houseGroup.add(windowL);

const windowR = new THREE.Mesh(
  new THREE.BoxGeometry(0.26, 0.26, 0.04),
  windowMat.clone()
);
windowR.position.set(0.46, 0.83, 0.88);
houseGroup.add(windowR);

const chimney = new THREE.Mesh(
  new THREE.BoxGeometry(0.18, 0.60, 0.18),
  new THREE.MeshStandardMaterial({
    color: 0xb56a52,
    roughness: 0.95
  })
);
chimney.position.set(0.50, 2.10, 0.20);
houseGroup.add(chimney);

/* ==========
   木
========== */
function makeTree(x, z, trunkColor, leafColor) {
  const tree = new THREE.Group();

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.06, 0.38, 10),
    new THREE.MeshStandardMaterial({ color: trunkColor })
  );
  trunk.position.y = 0.20;
  tree.add(trunk);

  const leaf = new THREE.Mesh(
    new THREE.SphereGeometry(0.25, 18, 18),
    new THREE.MeshStandardMaterial({
      color: leafColor,
      roughness: 0.9
    })
  );
  leaf.position.y = 0.50;
  tree.add(leaf);

  tree.position.set(x, 0, z);
  return tree;
}

houseGroup.add(makeTree(-1.08, 0.34, 0x6d4a30, 0x76bd62));
houseGroup.add(makeTree( 1.08, 0.20, 0x6d4a30, 0x69b857));

/* ==========
   水面
========== */
const waterPlane = new THREE.Mesh(
  new THREE.CircleGeometry(2.7, 80),
  new THREE.MeshBasicMaterial({
    color: 0x9fdcff,
    transparent: true,
    opacity: 0.10,
    depthWrite: false
  })
);
waterPlane.rotation.x = -Math.PI / 2;
waterPlane.position.set(0, -3.55, 0);
world.add(waterPlane);

const waterGlow = new THREE.Mesh(
  new THREE.CircleGeometry(2.95, 80),
  new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.05,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
waterGlow.rotation.x = -Math.PI / 2;
waterGlow.position.set(0, -3.52, 0);
world.add(waterGlow);

/* ==========
   テクスチャ
========== */
function makePetalTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.rotate(-0.35);

  const grad = ctx.createRadialGradient(-8, -12, 4, 0, 0, 40);
  grad.addColorStop(0, "rgba(255,240,248,1)");
  grad.addColorStop(1, "rgba(255,160,205,0.98)");
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -32);
  ctx.bezierCurveTo(28, -22, 30, 10, 0, 34);
  ctx.bezierCurveTo(-24, 10, -22, -22, 0, -32);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 4, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.28, "rgba(255,250,180,0.95)");
  grad.addColorStop(0.62, "rgba(255,225,120,0.50)");
  grad.addColorStop(1, "rgba(255,220,120,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeLeafTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.rotate(0.2);

  const grad = ctx.createLinearGradient(-20, -30, 20, 30);
  grad.addColorStop(0, "rgba(255,185,70,1)");
  grad.addColorStop(0.5, "rgba(220,110,30,1)");
  grad.addColorStop(1, "rgba(168,70,22,1)");
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -34);
  ctx.bezierCurveTo(26, -12, 22, 28, 0, 36);
  ctx.bezierCurveTo(-22, 28, -28, -12, 0, -34);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeSnowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.strokeStyle = "rgba(255,255,255,0.98)";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  for (let i = 0; i < 6; i++) {
    ctx.save();
    ctx.rotate((Math.PI / 3) * i);
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(0, 30);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(-7, -7);
    ctx.moveTo(0, -14); ctx.lineTo(7, -7);
    ctx.moveTo(0, 14);  ctx.lineTo(-7, 7);
    ctx.moveTo(0, 14);  ctx.lineTo(7, 7);
    ctx.stroke();
    ctx.restore();
  }

  return new THREE.CanvasTexture(canvas);
}

function makeSmokeTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 50);
  grad.addColorStop(0, "rgba(255,255,255,0.72)");
  grad.addColorStop(0.45, "rgba(240,240,245,0.46)");
  grad.addColorStop(0.80, "rgba(220,225,235,0.18)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 50, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

const texSakura = makePetalTexture();
const texLight  = makeGlowTexture();
const texLeaf   = makeLeafTexture();
const texSnow   = makeSnowTexture();
const texSmoke  = makeSmokeTexture();

/* ==========
   均等配置：桜・光・家・もみじ・雪
========== */
/* 画面の左から右へ、かなり均等になるように広げる */
const zoneConfigs = [
  { texture: texSakura, xMin: -15.80, xMax: -13.20, yMin: -3.30, yMax: 1.8, opacity: 0.95, scaleMin: 0.22, scaleMax: 0.34, speed: 0.010, kind: "sakura" },
  { texture: texLight,  xMin: -8.90, xMax: -6.30, yMin: -3.20, yMax: 2.1, opacity: 0.88, scaleMin: 0.14, scaleMax: 0.22, speed: 0.013, kind: "light"  },
  { texture: texLeaf,   xMin:  6.30, xMax:  8.90, yMin: -3.30, yMax: 1.8, opacity: 0.93, scaleMin: 0.22, scaleMax: 0.34, speed: 0.010, kind: "leaf"   },
  { texture: texSnow,   xMin:  13.20, xMax:  15.80, yMin: -3.25, yMax: 1.9, opacity: 0.92, scaleMin: 0.16, scaleMax: 0.25, speed: 0.008, kind: "snow"   }
];

const seasonalGroup = new THREE.Group();
world.add(seasonalGroup);

const seasonalParticles = [];

function resetSeasonParticle(p, zone, first = false) {
  p.userData.zone = zone;
  p.position.x = zone.xMin + Math.random() * (zone.xMax - zone.xMin);
  p.position.z = (Math.random() - 0.5) * 1.2;
  p.position.y = first
    ? zone.yMin + Math.random() * (zone.yMax - zone.yMin)
    : zone.yMin + Math.random() * 0.12;

  p.material.map = zone.texture;
  p.material.opacity = zone.opacity;
  p.material.rotation = Math.random() * Math.PI;
  p.material.needsUpdate = true;

  const s = zone.scaleMin + Math.random() * (zone.scaleMax - zone.scaleMin);
  p.scale.set(s, s, 1);
  p.userData.seed = Math.random() * Math.PI * 2;
}

zoneConfigs.forEach(zone => {
  const count = zone.kind === "light" ? 36 : 44;
  for (let i = 0; i < count; i++) {
    const mat = new THREE.SpriteMaterial({
      map: zone.texture,
      transparent: true,
      opacity: zone.opacity,
      depthWrite: false,
      depthTest: true,
      color: 0xffffff
    });
    const sprite = new THREE.Sprite(mat);
    seasonalGroup.add(sprite);
    seasonalParticles.push(sprite);
    resetSeasonParticle(sprite, zone, true);
  }
});

function updateSeasonParticles(t) {
  for (const p of seasonalParticles) {
    const z = p.userData.zone;

    p.position.y += z.speed + Math.random() * 0.0015;

    if (z.kind === "sakura") {
      p.position.x += Math.sin(t * 1.8 + p.userData.seed) * 0.004;
      p.material.rotation += 0.01;
    } else if (z.kind === "light") {
      p.position.x += Math.sin(t * 2.4 + p.userData.seed) * 0.0025;
      p.position.y += Math.sin(t * 2.6 + p.userData.seed) * 0.0018;
      p.material.rotation += 0.002;
    } else if (z.kind === "leaf") {
      p.position.x += Math.sin(t * 1.7 + p.userData.seed) * 0.0035;
      p.position.z += Math.cos(t * 1.4 + p.userData.seed) * 0.003;
      p.material.rotation += 0.015;
    } else if (z.kind === "snow") {
      p.position.x += Math.sin(t * 1.2 + p.userData.seed) * 0.0018;
      p.material.rotation += 0.004;
    }

    if (p.position.y > z.yMax) {
      resetSeasonParticle(p, z, false);
    }
  }
}

/* ==========
   けむり（白）
========== */
const smokeGroup = new THREE.Group();
houseGroup.add(smokeGroup);

const smokeParticles = [];
const smokeCount = 28;

function resetSmoke(p, first = false) {
  p.position.set(
    0.50 + (Math.random() - 0.5) * 0.07,
    first ? 2.16 + Math.random() * 1.8 : 2.16,
    0.20 + (Math.random() - 0.5) * 0.05
  );
  const s = 0.18 + Math.random() * 0.16;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.34 + Math.random() * 0.14;
  p.userData.seed = Math.random() * Math.PI * 2;
}

for (let i = 0; i < smokeCount; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texSmoke,
    transparent: true,
    opacity: 0.42,
    depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  smokeGroup.add(sp);
  smokeParticles.push(sp);
  resetSmoke(sp, true);
}

function updateSmoke(t) {
  for (const p of smokeParticles) {
    p.position.y += 0.012;
    p.position.x += Math.sin(t * 1.5 + p.userData.seed) * 0.0022;
    p.position.z += Math.cos(t * 1.2 + p.userData.seed) * 0.0014;
    p.scale.x += 0.0015;
    p.scale.y += 0.0015;
    p.material.opacity -= 0.0015;

    if (p.position.y > 4.0 || p.material.opacity <= 0.02) {
      resetSmoke(p, false);
    }
  }
}

/* ==========
   船（画面外→画面外）
========== */
const textureLoader = new THREE.TextureLoader();

function makeShip(filename, x, y, z, width, height, dir, speed) {
  const tex = textureLoader.load(filename);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  mesh.position.set(x, y, z);
  mesh.userData = { dir, speed, startZ: z, baseY: y };
  return mesh;
}

/* しっかり画面外から出て、画面外へ消える値 */
const RIGHT_OUT = 30;
const LEFT_OUT  = -30;

const ships = [
  makeShip("ship1.png", RIGHT_OUT + 2.0, -2.98, -1.00, 2.35, 1.60, -1, 0.026),
  makeShip("ship2.png", RIGHT_OUT + 8.0, -3.08, -1.18, 2.05, 1.42, -1, 0.020),
  makeShip("ship3.png", LEFT_OUT  - 2.0, -2.94, -0.90, 2.25, 1.52,  1, 0.024),
  makeShip("ship4.png", LEFT_OUT  - 8.0, -3.10, -1.26, 1.95, 1.34,  1, 0.018)
];

ships.forEach(s => {
  s.renderOrder = 5;
  world.add(s);
});

function updateShips(t) {
  ships.forEach((ship, i) => {
    ship.position.x += ship.userData.dir * ship.userData.speed;
    ship.position.y = ship.userData.baseY + Math.sin(t * (1.3 + i * 0.12) + i) * 0.010;
    ship.position.z = ship.userData.startZ;

    if (ship.userData.dir < 0 && ship.position.x < LEFT_OUT - 2.5) {
      ship.position.x = RIGHT_OUT + 2.5;
    }

    if (ship.userData.dir > 0 && ship.position.x > RIGHT_OUT + 2.5) {
      ship.position.x = LEFT_OUT - 2.5;
    }
  });
}

/* ==========
   きらめき
========== */
const sparkleGroup = new THREE.Group();
world.add(sparkleGroup);

for (let i = 0; i < 16; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.022, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.7
    })
  );

  const rr = 2.1 * Math.random();
  const aa = Math.random() * Math.PI * 2;
  const yy = -2.7 + Math.random() * 4.2;

  s.position.set(
    Math.cos(aa) * rr * 0.55,
    yy,
    Math.sin(aa) * rr * 0.55
  );

  s.userData = {
    baseY: s.position.y,
    phase: Math.random() * Math.PI * 2
  };

  sparkleGroup.add(s);
}

/* ==========
   アニメーション
========== */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateSeasonParticles(t);
  updateSmoke(t);
  updateShips(t);

  waterPlane.material.opacity = 0.08 + Math.sin(t * 1.5) * 0.015;
  waterGlow.material.opacity = 0.04 + Math.sin(t * 2.2) * 0.012;

  sparkleGroup.children.forEach((p, i) => {
    p.position.y = p.userData.baseY + Math.sin(t * 1.7 + p.userData.phase) * 0.025;
    p.material.opacity = 0.38 + 0.22 * Math.sin(t * 2.0 + i);
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
</body>
</html>
