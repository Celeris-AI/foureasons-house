<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>四季の家</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:skyblue;
}
</style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight);
camera.position.set(10,8,10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// 光
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

// 地面
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({ color:0x88cc88 })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// 家
const house = new THREE.Mesh(
  new THREE.BoxGeometry(5,4,5),
  new THREE.MeshStandardMaterial({ color:0xffffff })
);
house.position.y = 2;
scene.add(house);

// 屋根
const roof = new THREE.Mesh(
  new THREE.ConeGeometry(4,2,4),
  new THREE.MeshStandardMaterial({ color:0xaa3333 })
);
roof.position.y = 5;
roof.rotation.y = Math.PI/4;
scene.add(roof);

// アニメーション
function animate(){
  requestAnimationFrame(animate);
  house.rotation.y += 0.01;
  roof.rotation.y += 0.01;
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>

</body>
</html>
