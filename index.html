<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>見つかる立体家</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#87ceeb, #e8f6ff);
      font-family: sans-serif;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      padding: 10px 14px;
      border-radius: 12px;
      color: #222;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="info">
    🏠 家が中央に出ます<br>
    ドラッグで回転・ホイールで拡大縮小
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(12, 8, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 3, 0);

    // ライト
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // 地面
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x7fcf6a })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 家グループ
    const house = new THREE.Group();
    scene.add(house);

    // 壁
    const walls = new THREE.Mesh(
      new THREE.BoxGeometry(6, 4, 6),
      new THREE.MeshStandardMaterial({ color: 0xf5e6d3 })
    );
    walls.position.y = 2;
    walls.castShadow = true;
    walls.receiveShadow = true;
    house.add(walls);

    // 屋根
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(5, 3, 4),
      new THREE.MeshStandardMaterial({ color: 0x8b3f2b })
    );
    roof.position.y = 5.5;
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    roof.receiveShadow = true;
    house.add(roof);

    // ドア
    const door = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x654321 })
    );
    door.position.set(0, 1.1, 3.1);
    door.castShadow = true;
    house.add(door);

    // 窓 左
    const win1 = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 0.15),
      new THREE.MeshStandardMaterial({ color: 0xaee4ff })
    );
    win1.position.set(-1.8, 2.4, 3.1);
    house.add(win1);

    // 窓 右
    const win2 = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 0.15),
      new THREE.MeshStandardMaterial({ color: 0xaee4ff })
    );
    win2.position.set(1.8, 2.4, 3.1);
    house.add(win2);

    // 補助グリッド
    const grid = new THREE.GridHelper(30, 30);
    scene.add(grid);

    function animate() {
      requestAnimationFrame(animate);
      house.rotation.y += 0.005;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
