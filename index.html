<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Circle Crystal World</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #status {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    color: #fff;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="status">魔導世界を読み込み中…</div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const statusEl = document.getElementById("status");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03060d);

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2.7, 14);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, -0.8, -5.8);

/* ==========
   ライト
========== */
scene.add(new THREE.AmbientLight(0xffffff, 1.25));

const dirLight = new THREE.DirectionalLight(0xd9eeff, 1.8);
dirLight.position.set(7, 10, 8);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xa7cfff, 0.8);
fillLight.position.set(-8, 4, -6);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0x8fd3ff, 3.5, 30, 2);
pointLight.position.set(0, -1.0, -6.2);
scene.add(pointLight);

/* ==========
   ワールド
========== */
const world = new THREE.Group();
world.position.set(0, -0.9, -6.2);
scene.add(world);

/* ==========
   前景
========== */
const frontMist = new THREE.Mesh(
  new THREE.PlaneGeometry(44, 14),
  new THREE.MeshBasicMaterial({
    color: 0x6ab8ff,
    transparent: true,
    opacity: 0.06,
    depthWrite: false
  })
);
frontMist.position.set(0, -4.2, -8);
scene.add(frontMist);

/* ==========
   魔法陣テクスチャ
========== */
function makeMagicCircleTexture(size = 2048, hue = "170,235,255") {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  const cx = size / 2;
  const cy = size / 2;

  ctx.clearRect(0, 0, size, size);

  const bgGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.49);
  bgGlow.addColorStop(0.0, `rgba(${hue},0.16)`);
  bgGlow.addColorStop(0.28, `rgba(${hue},0.08)`);
  bgGlow.addColorStop(0.55, `rgba(${hue},0.035)`);
  bgGlow.addColorStop(1.0, "rgba(0,0,0,0)");
  ctx.fillStyle = bgGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.49, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(${hue},0.96)`;
  ctx.lineWidth = size * 0.0022;
  ctx.shadowColor = `rgba(${hue},0.95)`;
  ctx.shadowBlur = size * 0.012;

  function ring(r, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0022 * width;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function arcRing(r, count, arcRatio = 0.72, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0022 * width;
    for (let i = 0; i < count; i++) {
      const a0 = rotation + (Math.PI * 2 * i) / count;
      const a1 = a0 + (Math.PI * 2 / count) * arcRatio;
      ctx.beginPath();
      ctx.arc(cx, cy, r, a0, a1);
      ctx.stroke();
    }
    ctx.restore();
  }

  function polygon(r, sides, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0022 * width;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = rotation + (Math.PI * 2 * i) / sides;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function star(rOuter, rInner, points, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0022 * width;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOuter : rInner;
      const a = rotation + (Math.PI * i) / points;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function radialLines(r1, r2, count, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0022 * width;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x1 = cx + Math.cos(a) * r1;
      const y1 = cy + Math.sin(a) * r1;
      const x2 = cx + Math.cos(a) * r2;
      const y2 = cy + Math.sin(a) * r2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function tickRing(r, count, len, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.002 * width;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x1 = cx + Math.cos(a) * (r - len * 0.5);
      const y1 = cy + Math.sin(a) * (r - len * 0.5);
      const x2 = cx + Math.cos(a) * (r + len * 0.5);
      const y2 = cy + Math.sin(a) * (r + len * 0.5);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function runeDots(r, count, dotR, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgba(${hue},0.98)`;
    ctx.shadowColor = `rgba(${hue},1)`;
    ctx.shadowBlur = size * 0.012;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function runeMarks(r, count, rotation = 0, alpha = 1, scale = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0018;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);
      ctx.scale(scale, scale);

      ctx.beginPath();
      ctx.moveTo(0, -size * 0.010);
      ctx.lineTo(0, size * 0.010);
      ctx.moveTo(-size * 0.006, 0);
      ctx.lineTo(size * 0.006, 0);
      ctx.moveTo(0, -size * 0.010);
      ctx.lineTo(size * 0.006, -size * 0.016);
      ctx.moveTo(0, size * 0.010);
      ctx.lineTo(-size * 0.006, size * 0.016);
      ctx.stroke();

      ctx.restore();
    }
    ctx.restore();
  }

  function orbitCircles(r, count, subR, rotation = 0, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.0018 * width;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, subR, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  ring(size * 0.460, 0.35, 0.9);
  ring(size * 0.442, 0.75, 1.5);
  arcRing(size * 0.425, 36, 0.58, 0, 0.70, 0.9);
  ring(size * 0.405, 0.65, 0.9);
  tickRing(size * 0.392, 72, size * 0.010, 0, 0.65, 0.8);

  ring(size * 0.360, 0.75, 1.2);
  runeMarks(size * 0.340, 24, Math.PI / 24, 0.92, 1.0);
  runeDots(size * 0.320, 24, size * 0.0038, 0, 0.85);
  ring(size * 0.300, 0.65, 0.9);

  radialLines(size * 0.230, size * 0.395, 24, 0, 0.22, 0.8);
  radialLines(size * 0.140, size * 0.275, 12, Math.PI / 12, 0.45, 1.0);

  polygon(size * 0.280, 6, -Math.PI / 2, 0.55, 1.0);
  star(size * 0.248, size * 0.155, 12, -Math.PI / 2, 0.80, 1.0);
  polygon(size * 0.188, 3, -Math.PI / 2, 0.72, 1.1);
  star(size * 0.145, size * 0.090, 6, Math.PI / 6, 0.68, 0.9);

  orbitCircles(size * 0.215, 6, size * 0.025, Math.PI / 6, 0.55, 0.9);
  orbitCircles(size * 0.115, 3, size * 0.018, -Math.PI / 2, 0.60, 0.9);

  ring(size * 0.132, 0.86, 1.0);
  arcRing(size * 0.112, 12, 0.50, Math.PI / 12, 0.68, 0.9);
  tickRing(size * 0.092, 24, size * 0.008, 0, 0.72, 0.8);
  ring(size * 0.070, 0.88, 1.0);

  const coreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.11);
  coreGlow.addColorStop(0.0, "rgba(255,255,255,1)");
  coreGlow.addColorStop(0.18, `rgba(${hue},0.98)`);
  coreGlow.addColorStop(0.45, `rgba(${hue},0.34)`);
  coreGlow.addColorStop(1.0, `rgba(${hue},0)`);
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.11, 0, Math.PI * 2);
  ctx.fill();

  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.lineWidth = size * 0.002;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = -Math.PI / 2 + (Math.PI * 2 * i) / 8;
    const x = cx + Math.cos(a) * size * 0.048;
    const y = cy + Math.sin(a) * size * 0.048;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 3, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.2, "rgba(200,245,255,1)");
  grad.addColorStop(0.55, "rgba(120,200,255,0.45)");
  grad.addColorStop(1, "rgba(120,200,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

const texGlow = makeGlowTexture();

/* ==========
   床
========== */
const floorGlow = new THREE.Mesh(
  new THREE.CircleGeometry(4.5, 96),
  new THREE.MeshBasicMaterial({
    color: 0x8fd3ff,
    transparent: true,
    opacity: 0.10,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
floorGlow.rotation.x = -Math.PI / 2;
floorGlow.position.set(0, -3.44, 0);
world.add(floorGlow);

/* ==========
   魔法陣
========== */
const outerMagicTexture = makeMagicCircleTexture(2048, "170,235,255");
const innerMagicTexture = makeMagicCircleTexture(2048, "130,190,255");

const magicCircleOuter = new THREE.Mesh(
  new THREE.CircleGeometry(4.0, 192),
  new THREE.MeshBasicMaterial({
    map: outerMagicTexture,
    transparent: true,
    opacity: 0.94,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
magicCircleOuter.rotation.x = -Math.PI / 2;
magicCircleOuter.position.set(0, -3.30, 0.01);
world.add(magicCircleOuter);

const magicCircleInner = new THREE.Mesh(
  new THREE.CircleGeometry(2.9, 192),
  new THREE.MeshBasicMaterial({
    map: innerMagicTexture,
    transparent: true,
    opacity: 0.86,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
magicCircleInner.rotation.x = -Math.PI / 2;
magicCircleInner.position.set(0, -3.27, 0.02);
world.add(magicCircleInner);

/* ==========
   クリスタル
========== */
const crystalGroup = new THREE.Group();
crystalGroup.position.set(0, -1.85, 0);
world.add(crystalGroup);

const crystalCore = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.85, 0),
  new THREE.MeshPhysicalMaterial({
    color: 0xa8e7ff,
    emissive: 0x4ea9ff,
    emissiveIntensity: 1.6,
    roughness: 0.05,
    transmission: 0.15,
    transparent: true,
    opacity: 0.92,
    metalness: 0.12,
    clearcoat: 1.0,
    clearcoatRoughness: 0.04
  })
);
crystalGroup.add(crystalCore);

const crystalInner = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.46, 0),
  new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending
  })
);
crystalGroup.add(crystalInner);

/* ==========
   光の柱
========== */
const beam = new THREE.Mesh(
  new THREE.CylinderGeometry(0.32, 0.48, 8.5, 48, 1, true),
  new THREE.MeshBasicMaterial({
    color: 0x8ecfff,
    transparent: true,
    opacity: 0.16,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
beam.position.set(0, 0.2, 0);
world.add(beam);

/* ==========
   魔力粒子
========== */
const particleGroup = new THREE.Group();
world.add(particleGroup);

const magicParticles = [];

function resetMagicParticle(p, first = false) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 0.35 + Math.random() * 1.1;
  p.userData.angle = angle;
  p.userData.radius = radius;
  p.userData.height = first ? (-3.2 + Math.random() * 5.6) : -3.2;
  p.userData.speed = 0.012 + Math.random() * 0.009;
  p.userData.spin = 0.012 + Math.random() * 0.018;
  p.userData.seed = Math.random() * Math.PI * 2;

  const s = 0.07 + Math.random() * 0.12;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.42 + Math.random() * 0.35;
}

for (let i = 0; i < 90; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texGlow,
    transparent: true,
    opacity: 0.8,
    depthWrite: false,
    color: i % 5 === 0 ? 0xffffff : 0xaee2ff
  });

  const sprite = new THREE.Sprite(mat);
  particleGroup.add(sprite);
  magicParticles.push(sprite);
  resetMagicParticle(sprite, true);
}

function updateMagicParticles(t) {
  for (const p of magicParticles) {
    p.userData.height += p.userData.speed;
    p.userData.angle += p.userData.spin;

    const wobble = Math.sin(t * 2.0 + p.userData.seed) * 0.08;
    const r = p.userData.radius + wobble;

    p.position.x = Math.cos(p.userData.angle) * r;
    p.position.z = Math.sin(p.userData.angle) * r * 0.45;
    p.position.y = p.userData.height;

    p.material.opacity = 0.35 + 0.25 * Math.sin(t * 3.0 + p.userData.seed);

    if (p.userData.height > 2.8) {
      resetMagicParticle(p, false);
    }
  }
}

statusEl.textContent = "準備OK";

/* ==========
   アニメーション
========== */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateMagicParticles(t);

  magicCircleOuter.rotation.z = t * 0.16;
  magicCircleInner.rotation.z = -t * 0.28;

  magicCircleOuter.material.opacity = 0.84 + Math.sin(t * 1.8) * 0.08;
  magicCircleInner.material.opacity = 0.72 + Math.sin(t * 2.2 + 0.8) * 0.10;

  crystalGroup.rotation.y += 0.01;
  crystalCore.rotation.x = Math.sin(t * 0.8) * 0.08;
  crystalCore.rotation.z = Math.cos(t * 0.7) * 0.08;
  crystalGroup.position.y = -1.85 + Math.sin(t * 1.6) * 0.12;

  crystalInner.rotation.y -= 0.018;
  crystalInner.rotation.x += 0.01;

  beam.material.opacity = 0.11 + Math.sin(t * 2.1) * 0.05;
  beam.scale.x = 1 + Math.sin(t * 1.4) * 0.05;
  beam.scale.z = 1 + Math.cos(t * 1.2) * 0.05;

  floorGlow.material.opacity = 0.08 + Math.sin(t * 1.5) * 0.03;
  frontMist.material.opacity = 0.04 + Math.sin(t * 0.8) * 0.02;
  pointLight.intensity = 3.1 + Math.sin(t * 2.0) * 0.5;

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
</body>
</html>
