<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Four Seasons House</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(#8fd3ff, #eefaff);
      font-family: sans-serif;
    }

    #info {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.88);
      padding: 10px 14px;
      border-radius: 12px;
      color: #234;
      font-size: 14px;
      line-height: 1.5;
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info">
    🏠 四季の家・試作版<br>
    ドラッグ: 回転 / ホイール: 拡大縮小
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdff4ff);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(10, 8, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(10, 15, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x8fd07a })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const houseGroup = new THREE.Group();
    scene.add(houseGroup);

    const walls = new THREE.Mesh(
      new THREE.BoxGeometry(6, 4, 6),
      new THREE.MeshStandardMaterial({ color: 0xf6eadb })
    );
    walls.position.y = 2;
    walls.castShadow = true;
    walls.receiveShadow = true;
    houseGroup.add(walls);

    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(4.8, 2.8, 4),
      new THREE.MeshStandardMaterial({ color: 0x9c4332 })
    );
    roof.position.y = 5.4;
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    roof.receiveShadow = true;
    houseGroup.add(roof);

    const door = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.2, 0.15),
      new THREE.MeshStandardMaterial({ color: 0x6d4a30 })
    );
    door.position.set(0, 1.1, 3.08);
    door.castShadow = true;
    houseGroup.add(door);

    function makeWindow(x, y, z, ry = 0) {
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1.3, 1.1, 0.12),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      frame.position.set(x, y, z);
      frame.rotation.y = ry;

      const glass = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 0.8, 0.06),
        new THREE.MeshStandardMaterial({
          color: 0xaedfff,
          transparent: true,
          opacity: 0.85
        })
      );
      glass.position.z = 0.05;
      frame.add(glass);

      return frame;
    }

    houseGroup.add(makeWindow(-1.8, 2.4, 3.08, 0));
    houseGroup.add(makeWindow( 1.8, 2.4, 3.08, 0));
    houseGroup.add(makeWindow( 3.08, 2.4, 0, Math.PI / 2));
    houseGroup.add(makeWindow(-3.08, 2.4, 0, Math.PI / 2));

    const chimney = new THREE.Mesh(
      new THREE.BoxGeometry(0.7, 1.8, 0.7),
      new THREE.MeshStandardMaterial({ color: 0xb56a52 })
    );
    chimney.position.set(1.6, 6.0, 0.8);
    chimney.castShadow = true;
    houseGroup.add(chimney);

    function makeTree(x, z) {
      const tree = new THREE.Group();

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.3, 2, 10),
        new THREE.MeshStandardMaterial({ color: 0x7b4a24 })
      );
      trunk.position.y = 1;
      trunk.castShadow = true;
      tree.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 20, 20),
        new THREE.MeshStandardMaterial({ color: 0x5ab85a })
      );
      leaves.position.y = 2.5;
      leaves.castShadow = true;
      tree.add(leaves);

      tree.position.set(x, 0, z);
      return tree;
    }

    const tree1 = makeTree(-5.5, -1.5);
    const tree2 = makeTree(5.5, 1.5);
    scene.add(tree1, tree2);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      houseGroup.rotation.y += 0.004;
      tree1.rotation.z = Math.sin(t * 1.4) * 0.02;
      tree2.rotation.z = Math.sin(t * 1.2 + 1.2) * 0.02;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
