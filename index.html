<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glass Planet House - Seasonal Music Sync</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: sans-serif; background: #dff4ff;
    }
    #info {
      position: fixed; left: 14px; top: 14px; z-index: 20;
      padding: 10px 14px; border-radius: 14px;
      background: rgba(255,255,255,0.84); color: #234;
      font-size: 14px; line-height: 1.6; backdrop-filter: blur(8px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.12); max-width: min(92vw, 470px);
    }
    #info b { font-size: 15px; }
    #season-ui {
      position: fixed; right: 14px; top: 14px; z-index: 20;
      display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;
      max-width:min(92vw, 520px);
    }
    .season-btn, .control-btn {
      border:none; padding:10px 14px; border-radius:999px; font-size:14px;
      cursor:pointer; color:#203040; background:rgba(255,255,255,0.86);
      box-shadow:0 8px 18px rgba(0,0,0,0.12); backdrop-filter:blur(8px);
      transition:transform .15s ease, box-shadow .15s ease, background .2s ease;
    }
    .season-btn:hover, .control-btn:hover {
      transform:translateY(-2px); box-shadow:0 12px 22px rgba(0,0,0,0.16);
    }
    .season-btn.active, .control-btn.active {
      background:rgba(255,245,220,0.96); box-shadow:0 12px 24px rgba(0,0,0,0.18);
    }
    #chips {
      position: fixed; left: 14px; bottom: 14px; z-index: 20;
      display:flex; flex-wrap:wrap; gap:8px; max-width:min(92vw, 760px);
    }
    .chip {
      display:inline-block; padding:6px 12px; border-radius:999px;
      background:rgba(255,255,255,0.78); color:#234; font-size:13px;
      box-shadow:0 6px 14px rgba(0,0,0,0.08); backdrop-filter:blur(8px);
    }
    @media (max-width:700px) {
      #season-ui { left:14px; right:14px; top:auto; bottom:68px; justify-content:center; }
      .season-btn, .control-btn { flex:1 1 calc(50% - 8px); min-width:120px; }
      #chips { bottom:14px; }
    }

    .ui { }
    #record-btn {
      background: rgba(255,235,210,0.92);
    }
    body.recording .ui {
      display: none !important;
    }
    body.recording {
      cursor: none;
    }

  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="info" class="ui">
    <b>🏠🔮☁️🌌 季節オルゴール同期版</b><br>
    ドラッグ: 視点回転<br>
    ホイール: 拡大縮小<br>
    Rキー: 回転ON/OFF<br>
    Mキー: 音楽ON/OFF<br>
    Space: 再生/一時停止<br>
    <span id="status-line">待機中</span>
  </div>

  <div id="season-ui" class="ui">
    <button class="season-btn active" data-season="spring">🌸 春</button>
    <button class="season-btn" data-season="summer">☀️ 夏</button>
    <button class="season-btn" data-season="autumn">🍁 秋</button>
    <button class="season-btn" data-season="winter">❄️ 冬</button>
    <button class="control-btn" id="play-btn">▶ 再生</button>
    <button class="control-btn" id="record-btn">🎬 録画モード</button>
  </div>

  <div id="chips" class="ui">
    <span class="chip" id="time-chip">時間帯: 昼</span>
    <span class="chip" id="track-chip">曲: 未再生</span>
    <span class="chip" id="remain-chip">残り: --:--</span>
    <span class="chip" id="phase-chip">季節: 春</span>
  </div>

  <audio id="season-audio" preload="auto" crossorigin="anonymous"></audio>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const statusLine = document.getElementById("status-line");
    const timeChip = document.getElementById("time-chip");
    const trackChip = document.getElementById("track-chip");
    const remainChip = document.getElementById("remain-chip");
    const phaseChip = document.getElementById("phase-chip");
    const playBtn = document.getElementById("play-btn");
    const recordBtn = document.getElementById("record-btn");
    const audio = document.getElementById("season-audio");

    // -----------------------------
    // 4曲の設定
    // 同じフォルダに mp3 を置けばそのまま動きます
    // -----------------------------
    const playlist = [
      { key: "spring", label: "春", emoji: "🌸", file: "春のオルゴール.mp3", duration: 152 },
      { key: "summer", label: "夏", emoji: "☀️", file: "夏のオルゴール.mp3", duration: 154 },
      { key: "autumn", label: "秋", emoji: "🍁", file: "秋のオルゴール.mp3", duration: 164 },
      { key: "winter", label: "冬", emoji: "❄️", file: "冬のオルゴール.mp3", duration: 147 }
    ];

    // ---------------------------------
    // 基本
    // ---------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdff4ff);
    scene.fog = new THREE.Fog(0xdff4ff, 28, 100);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(18, 12, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, -1.2, 0);
    controls.minDistance = 10;
    controls.maxDistance = 34;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.35);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xfff6e8, 1.8);
    sunLight.position.set(12, 18, 10);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.left = -25;
    sunLight.shadow.camera.right = 25;
    sunLight.shadow.camera.top = 25;
    sunLight.shadow.camera.bottom = -25;
    sunLight.shadow.camera.near = 0.5;
    sunLight.shadow.camera.far = 90;
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0xe8f6ff, 0.65);
    fillLight.position.set(-10, 10, -8);
    scene.add(fillLight);

    const moonLight = new THREE.DirectionalLight(0xcfe6ff, 0.0);
    moonLight.position.set(-8, 12, -10);
    scene.add(moonLight);

    const staticGroup = new THREE.Group();
    const backgroundGroup = new THREE.Group();
    scene.add(staticGroup);
    scene.add(backgroundGroup);

    function createWallTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024; canvas.height = 1024;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#f6efe6"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, "rgba(255,255,255,0.22)");
      grad.addColorStop(1, "rgba(0,0,0,0.10)");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(120,105,90,0.18)"; ctx.lineWidth = 2;
      for (let y = 28; y < canvas.height; y += 28) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      for (let i = 0; i < 2600; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const alpha = Math.random() * 0.05;
        ctx.fillStyle = `rgba(95,78,60,${alpha})`;
        ctx.fillRect(x, y, 2, 2);
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(2.2, 1.2);
      return texture;
    }

    function createRoofTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024; canvas.height = 1024;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#984637"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, "rgba(255,255,255,0.12)");
      grad.addColorStop(1, "rgba(0,0,0,0.20)");
      ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = "rgba(60,18,10,0.30)"; ctx.lineWidth = 2;
      for (let y = 22; y < canvas.height; y += 22) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }
      for (let row = 0; row < 40; row++) {
        const y = row * 26;
        const offset = row % 2 === 0 ? 0 : 26;
        for (let x = offset; x < canvas.width; x += 52) {
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + 18); ctx.stroke();
        }
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(2.3, 2.0);
      return texture;
    }

    function createGroundTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024; canvas.height = 1024;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#8fcf73"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < 6500; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const w = 2 + Math.random() * 3;
        const h = 2 + Math.random() * 3;
        const g = 90 + Math.floor(Math.random() * 80);
        const a = 0.10 + Math.random() * 0.08;
        ctx.fillStyle = `rgba(40,${g},30,${a})`;
        ctx.fillRect(x, y, w, h);
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(4, 4);
      return texture;
    }

    function makePetalTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.translate(64, 64); ctx.rotate(-0.35);
      const grad = ctx.createRadialGradient(-10, -12, 4, 0, 0, 42);
      grad.addColorStop(0, "rgba(255,228,240,1)");
      grad.addColorStop(1, "rgba(255,160,205,0.96)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -34);
      ctx.bezierCurveTo(28, -24, 34, 8, 0, 34);
      ctx.bezierCurveTo(-26, 8, -22, -24, 0, -34);
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    function makeLeafTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.translate(64, 64); ctx.rotate(0.2);
      const grad = ctx.createLinearGradient(-20, -30, 20, 30);
      grad.addColorStop(0, "rgba(255,185,70,1)");
      grad.addColorStop(0.5, "rgba(220,110,30,1)");
      grad.addColorStop(1, "rgba(168,70,22,0.98)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(0, -36);
      ctx.bezierCurveTo(28, -12, 22, 28, 0, 38);
      ctx.bezierCurveTo(-24, 28, -30, -12, 0, -36);
      ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    function makeSnowTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.translate(64, 64);
      ctx.strokeStyle = "rgba(255,255,255,0.98)";
      ctx.lineWidth = 4; ctx.lineCap = "round";
      for (let i = 0; i < 6; i++) {
        ctx.save(); ctx.rotate((Math.PI / 3) * i);
        ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(0, 34); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, -16); ctx.lineTo(-8, -8);
        ctx.moveTo(0, -16); ctx.lineTo(8, -8);
        ctx.moveTo(0, 16); ctx.lineTo(-8, 8);
        ctx.moveTo(0, 16); ctx.lineTo(8, 8);
        ctx.stroke();
        ctx.restore();
      }
      return new THREE.CanvasTexture(canvas);
    }

    function makeGlowTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext("2d");
      const grad = ctx.createRadialGradient(64, 64, 4, 64, 64, 50);
      grad.addColorStop(0, "rgba(255,255,225,1)");
      grad.addColorStop(0.35, "rgba(255,245,175,0.92)");
      grad.addColorStop(1, "rgba(255,230,120,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(64, 64, 50, 0, Math.PI * 2); ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    function makeSmokeTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 128; canvas.height = 128;
      const ctx = canvas.getContext("2d");
      const grad = ctx.createRadialGradient(64, 64, 6, 64, 64, 52);
      grad.addColorStop(0, "rgba(255,255,255,1)");
      grad.addColorStop(0.22, "rgba(245,245,245,0.95)");
      grad.addColorStop(0.48, "rgba(210,210,210,0.78)");
      grad.addColorStop(0.78, "rgba(145,145,145,0.38)");
      grad.addColorStop(1, "rgba(90,90,90,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(64, 64, 52, 0, Math.PI * 2); ctx.fill();
      return new THREE.CanvasTexture(canvas);
    }

    const wallTexture = createWallTexture();
    const roofTexture = createRoofTexture();
    const groundTexture = createGroundTexture();

    const glassSphereRadius = 8.6;
    const sphereCenterY = -4.8;

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xeaf8ff,
      transmission: 0.55,
      transparent: true,
      opacity: 0.52,
      roughness: 0.12,
      metalness: 0.0,
      thickness: 0.7,
      ior: 1.2,
      clearcoat: 1.0,
      clearcoatRoughness: 0.08,
      side: THREE.DoubleSide
    });

    const glassSphere = new THREE.Mesh(
      new THREE.SphereGeometry(glassSphereRadius, 96, 96),
      glassMaterial
    );
    glassSphere.position.set(0, sphereCenterY, 0);
    staticGroup.add(glassSphere);

    const glassHighlight = new THREE.Mesh(
      new THREE.SphereGeometry(glassSphereRadius + 0.04, 96, 96),
      new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.06, side: THREE.BackSide
      })
    );
    glassHighlight.position.copy(glassSphere.position);
    staticGroup.add(glassHighlight);

    const groundMaterial = new THREE.MeshStandardMaterial({ map: groundTexture, color: 0xffffff, roughness: 1 });
    const innerGround = new THREE.Mesh(new THREE.CircleGeometry(5.6, 80), groundMaterial);
    innerGround.rotation.x = -Math.PI / 2;
    innerGround.position.set(0, -6.6, 0);
    innerGround.receiveShadow = true;
    staticGroup.add(innerGround);

    const innerGroundBase = new THREE.Mesh(
      new THREE.CylinderGeometry(5.65, 5.95, 0.9, 64),
      new THREE.MeshStandardMaterial({ color: 0x8c6d4a, roughness: 1 })
    );
    innerGroundBase.position.set(0, -7.0, 0);
    innerGroundBase.receiveShadow = true;
    innerGroundBase.castShadow = true;
    staticGroup.add(innerGroundBase);

    const houseGroup = new THREE.Group();
    houseGroup.position.set(0, -6.2, 0);
    staticGroup.add(houseGroup);

    const foundationMaterial = new THREE.MeshStandardMaterial({ color: 0xb9b2a8, roughness: 1 });
    const foundation = new THREE.Mesh(new THREE.BoxGeometry(4.4, 0.32, 4.4), foundationMaterial);
    foundation.position.y = 0.16;
    foundation.castShadow = true;
    foundation.receiveShadow = true;
    houseGroup.add(foundation);

    const wallsMaterial = new THREE.MeshStandardMaterial({ map: wallTexture, color: 0xffffff, roughness: 0.93, metalness: 0.01 });
    const walls = new THREE.Mesh(new THREE.BoxGeometry(3.9, 2.6, 3.9), wallsMaterial);
    walls.position.y = 1.62;
    walls.castShadow = true;
    walls.receiveShadow = true;
    houseGroup.add(walls);

    const roofMaterial = new THREE.MeshStandardMaterial({ map: roofTexture, color: 0xffffff, roughness: 0.96, metalness: 0.01 });
    const roof = new THREE.Mesh(new THREE.ConeGeometry(2.9, 1.6, 4), roofMaterial);
    roof.position.y = 3.8;
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    roof.receiveShadow = true;
    houseGroup.add(roof);

    const eavesMaterial = new THREE.MeshStandardMaterial({ color: 0x7c3d31, roughness: 1 });
    const eaves = new THREE.Mesh(new THREE.CylinderGeometry(2.95, 2.95, 0.10, 4), eavesMaterial);
    eaves.position.y = 2.95;
    eaves.rotation.y = Math.PI / 4;
    eaves.castShadow = true;
    eaves.receiveShadow = true;
    houseGroup.add(eaves);

    const doorFrameMaterial = new THREE.MeshStandardMaterial({ color: 0xf2eadf, roughness: 0.95 });
    const doorFrame = new THREE.Mesh(new THREE.BoxGeometry(0.95, 1.55, 0.12), doorFrameMaterial);
    doorFrame.position.set(0, 0.88, 2.0);
    doorFrame.castShadow = true;
    houseGroup.add(doorFrame);

    const door = new THREE.Mesh(
      new THREE.BoxGeometry(0.68, 1.3, 0.10),
      new THREE.MeshStandardMaterial({ color: 0x6d4a30, roughness: 0.88 })
    );
    door.position.set(0, 0.8, 2.07);
    door.castShadow = true;
    houseGroup.add(door);

    const doorLineMaterial = new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 1 });
    for (let i = -1; i <= 1; i++) {
      const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.05, 0.015), doorLineMaterial);
      strip.position.set(i * 0.16, 0.82, 2.12);
      houseGroup.add(strip);
    }

    const knob = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 18, 18),
      new THREE.MeshStandardMaterial({ color: 0xf0cc73, metalness: 0.7, roughness: 0.28 })
    );
    knob.position.set(0.18, 0.78, 2.14);
    knob.castShadow = true;
    houseGroup.add(knob);

    const windowFrameMaterial = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.88 });
    const glassWindowMaterial = new THREE.MeshStandardMaterial({
      color: 0xbfe8ff, transparent: true, opacity: 0.75, roughness: 0.08, metalness: 0.14
    });
    const sillMaterial = new THREE.MeshStandardMaterial({ color: 0xe9e0d5, roughness: 1 });
    const glowWindows = [];

    function makeWindow(x, y, z, ry = 0) {
      const windowGroup = new THREE.Group();
      const frame = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.72, 0.10), windowFrameMaterial);
      frame.castShadow = true;
      windowGroup.add(frame);

      const glass = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.48, 0.05), glassWindowMaterial.clone());
      glass.position.z = 0.05;
      windowGroup.add(glass);

      const glow = new THREE.Mesh(
        new THREE.BoxGeometry(0.64, 0.42, 0.02),
        new THREE.MeshBasicMaterial({ color: 0xffd98a, transparent: true, opacity: 0.0 })
      );
      glow.position.z = 0.08;
      windowGroup.add(glow);
      glowWindows.push(glow);

      const barV = new THREE.Mesh(
        new THREE.BoxGeometry(0.05, 0.48, 0.02),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 })
      );
      barV.position.z = 0.075;
      windowGroup.add(barV);

      const barH = new THREE.Mesh(
        new THREE.BoxGeometry(0.72, 0.05, 0.02),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 })
      );
      barH.position.z = 0.075;
      windowGroup.add(barH);

      const sill = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.08, 0.16), sillMaterial);
      sill.position.set(0, -0.42, 0.02);
      sill.castShadow = true;
      windowGroup.add(sill);

      windowGroup.position.set(x, y, z);
      windowGroup.rotation.y = ry;
      return windowGroup;
    }

    houseGroup.add(makeWindow(-1.12, 1.7, 2.0, 0));
    houseGroup.add(makeWindow(1.12, 1.7, 2.0, 0));
    houseGroup.add(makeWindow(2.0, 1.7, 0, Math.PI / 2));
    houseGroup.add(makeWindow(-2.0, 1.7, 0, Math.PI / 2));

    const chimney = new THREE.Mesh(
      new THREE.BoxGeometry(0.42, 1.15, 0.42),
      new THREE.MeshStandardMaterial({ color: 0xb56a52, roughness: 0.95 })
    );
    chimney.position.set(1.05, 4.0, 0.55);
    chimney.castShadow = true;
    chimney.receiveShadow = true;
    houseGroup.add(chimney);

    const chimneyCap = new THREE.Mesh(
      new THREE.BoxGeometry(0.56, 0.08, 0.56),
      new THREE.MeshStandardMaterial({ color: 0x7a4637, roughness: 1 })
    );
    chimneyCap.position.set(1.05, 4.6, 0.55);
    chimneyCap.castShadow = true;
    houseGroup.add(chimneyCap);

    function makeFlowerBed(x, z, color = 0xff9ecf) {
      const bed = new THREE.Group();
      const soil = new THREE.Mesh(
        new THREE.CylinderGeometry(0.72, 0.72, 0.10, 24),
        new THREE.MeshStandardMaterial({ color: 0x7b5b3c, roughness: 1 })
      );
      soil.receiveShadow = true;
      bed.add(soil);
      const flowers = [];
      for (let i = 0; i < 12; i++) {
        const ang = (Math.PI * 2 * i) / 12;
        const r = 0.16 + Math.random() * 0.42;
        const flowerMat = new THREE.MeshStandardMaterial({ color, roughness: 0.9 });
        const flower = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), flowerMat);
        flower.position.set(Math.cos(ang) * r, 0.10 + Math.random() * 0.06, Math.sin(ang) * r);
        bed.add(flower);
        flowers.push(flowerMat);
      }
      bed.position.set(x, -6.13, z);
      bed.userData.flowerMaterials = flowers;
      return bed;
    }

    const flowerBed1 = makeFlowerBed(-1.5, 2.6, 0xffa4c7);
    const flowerBed2 = makeFlowerBed(1.55, 2.65, 0xffd36e);
    staticGroup.add(flowerBed1, flowerBed2);

    const cloudGroup = new THREE.Group();
    backgroundGroup.add(cloudGroup);

    function makeCloud(x, y, z, scale = 1) {
      const cloud = new THREE.Group();
      const mat = new THREE.MeshBasicMaterial({
        color: 0xffffff, transparent: true, opacity: 0.0, depthWrite: false, depthTest: false
      });
      const puff1 = new THREE.Mesh(new THREE.SphereGeometry(1.8, 18, 18), mat);
      puff1.position.set(-1.4, 0, 0); cloud.add(puff1);
      const puff2 = new THREE.Mesh(new THREE.SphereGeometry(2.2, 18, 18), mat);
      puff2.position.set(0, 0.45, 0); cloud.add(puff2);
      const puff3 = new THREE.Mesh(new THREE.SphereGeometry(1.7, 18, 18), mat);
      puff3.position.set(1.55, 0.1, 0); cloud.add(puff3);
      const puff4 = new THREE.Mesh(new THREE.SphereGeometry(1.35, 18, 18), mat);
      puff4.position.set(2.45, -0.1, 0.2); cloud.add(puff4);
      cloud.position.set(x, y, z);
      cloud.scale.setScalar(scale);
      cloud.userData.material = mat;
      return cloud;
    }

    const clouds = [
      makeCloud(-14, 9, -2, 0.95),
      makeCloud(-6, 11, -4, 0.82),
      makeCloud(4, 10, -3, 1.00),
      makeCloud(12, 12, -2, 0.88),
      makeCloud(-10, 13, 3, 0.92),
      makeCloud(8, 11, 4, 0.98),
      makeCloud(16, 10, 2, 0.78)
    ];
    clouds.forEach(cloud => cloudGroup.add(cloud));

    const starGeometry = new THREE.BufferGeometry();
    const starCount = 1000;
    const starPositions = [];
    for (let i = 0; i < starCount; i++) {
      const radius = 75 + Math.random() * 35;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);
      const x = Math.sin(phi) * Math.cos(theta) * radius;
      const y = Math.abs(Math.cos(phi)) * radius * 0.85 + 8;
      const z = Math.sin(phi) * Math.sin(theta) * radius;
      starPositions.push(x, y, z);
    }
    starGeometry.setAttribute("position", new THREE.Float32BufferAttribute(starPositions, 3));

    const starMaterial = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.56, transparent: true, opacity: 0.0, depthWrite: false
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    backgroundGroup.add(stars);

    const twinkleMaterial = new THREE.PointsMaterial({
      color: 0xffffff, size: 1.0, transparent: true, opacity: 0.0, depthWrite: false
    });
    const twinkleStars = new THREE.Points(starGeometry, twinkleMaterial);
    backgroundGroup.add(twinkleStars);

    const seasonTextures = {
      spring: makePetalTexture(),
      summer: makeGlowTexture(),
      autumn: makeLeafTexture(),
      winter: makeSnowTexture()
    };

    const particleCount = 140;
    const seasonParticles = [];
    const particleMaterials = [];
    const particleVelocities = [];

    function resetParticle(sprite, first = false) {
      const spread = 18;
      sprite.position.set(
        (Math.random() - 0.5) * spread,
        first ? Math.random() * 10 + 1 : Math.random() * 8 + 7,
        (Math.random() - 0.5) * spread
      );
      sprite.material.rotation = Math.random() * Math.PI;
      const s = 0.26 + Math.random() * 0.32;
      sprite.scale.set(s, s, 1);
    }

    function createSeasonParticles() {
      for (let i = 0; i < particleCount; i++) {
        const material = new THREE.SpriteMaterial({
          map: seasonTextures.spring, transparent: true, color: 0xffffff, opacity: 0.92, depthWrite: false
        });
        const sprite = new THREE.Sprite(material);
        resetParticle(sprite, true);
        scene.add(sprite);
        seasonParticles.push(sprite);
        particleMaterials.push(material);
        particleVelocities.push({
          x: (Math.random() - 0.5) * 0.008,
          y: -0.008 - Math.random() * 0.015,
          z: (Math.random() - 0.5) * 0.008,
          rot: (Math.random() - 0.5) * 0.06
        });
      }
    }
    createSeasonParticles();

    const smokeTexture = makeSmokeTexture();
    const smokeParticles = [];
    const smokeCount = 28;

    function resetSmoke(sprite, initial = false) {
      const chimneyTop = new THREE.Vector3(1.05, 4.75, 0.55);
      sprite.position.set(
        houseGroup.position.x + chimneyTop.x + (Math.random() - 0.5) * 0.14,
        houseGroup.position.y + chimneyTop.y + (initial ? Math.random() * 1.0 : 0),
        houseGroup.position.z + chimneyTop.z + (Math.random() - 0.5) * 0.14
      );
      const s = initial ? 0.55 + Math.random() * 0.55 : 0.34 + Math.random() * 0.24;
      sprite.scale.set(s, s, 1);
      sprite.userData = {
        vx: (Math.random() - 0.5) * 0.012,
        vy: 0.018 + Math.random() * 0.014,
        vz: (Math.random() - 0.5) * 0.012,
        life: initial ? Math.random() * 1.0 : 0,
        maxLife: 3.4 + Math.random() * 1.6,
        rot: (Math.random() - 0.5) * 0.03
      };
      sprite.material.opacity = 0.0;
      sprite.material.rotation = Math.random() * Math.PI;
    }

    function createSmoke() {
      for (let i = 0; i < smokeCount; i++) {
        const material = new THREE.SpriteMaterial({
          map: smokeTexture, transparent: true, opacity: 0, depthWrite: false, depthTest: false, color: 0xd8d8d8
        });
        const sprite = new THREE.Sprite(material);
        resetSmoke(sprite, true);
        sprite.renderOrder = 999;
        staticGroup.add(sprite);
        smokeParticles.push(sprite);
      }
    }
    createSmoke();

    function updateSmoke() {
      for (let i = 0; i < smokeParticles.length; i++) {
        const s = smokeParticles[i];
        const d = s.userData;
        d.life += 0.016;
        s.position.x += d.vx + Math.sin(d.life * 2.2 + i) * 0.003;
        s.position.y += d.vy;
        s.position.z += d.vz + Math.cos(d.life * 1.8 + i) * 0.003;
        s.material.rotation += d.rot;
        const t = d.life / d.maxLife;
        if (t < 0.2) s.material.opacity = t / 0.2 * 0.82;
        else s.material.opacity = (1 - t) * 0.82;
        const scale = 0.55 + t * 1.15;
        s.scale.set(scale, scale, 1);
        if (d.life >= d.maxLife) resetSmoke(s, false);
      }
    }

    const seasonState = {
      current: "spring",
      particleColor: new THREE.Color(0xffffff),
      particleOpacity: 0.92,
      particleScale: 1.0,
      windX: 0.003,
      windZ: 0.001,
      fallSpeed: 0.012
    };

    const seasonalConfigs = {
      spring: {
        ground: 0xa3d985, wall: 0xffffff, roof: 0xffffff, eaves: 0x7c3d31, foundation: 0xb9b2a8,
        flowers: [0xffa8cb, 0xffd56e], particleColor: 0xffffff, particleOpacity: 0.95,
        particleScale: 1.0, windX: 0.005, windZ: 0.001, fallSpeed: 0.016, glass: 0xeaf8ff
      },
      summer: {
        ground: 0x78c85c, wall: 0xfffbf4, roof: 0xe5c2b8, eaves: 0x8b4337, foundation: 0xb8b0a4,
        flowers: [0xff7fb8, 0xffd84d], particleColor: 0xffffff, particleOpacity: 0.80,
        particleScale: 0.70, windX: 0.001, windZ: 0.001, fallSpeed: 0.004, glass: 0xe7fbff
      },
      autumn: {
        ground: 0xb9934f, wall: 0xf9efe4, roof: 0xffd1c2, eaves: 0x7c3b2f, foundation: 0xb3aba1,
        flowers: [0xe9a76e, 0xd1b052], particleColor: 0xffffff, particleOpacity: 0.90,
        particleScale: 0.95, windX: 0.007, windZ: 0.003, fallSpeed: 0.020, glass: 0xfff2e8
      },
      winter: {
        ground: 0xf4f8fb, wall: 0xfafafa, roof: 0xf3e5df, eaves: 0x81615b, foundation: 0xc9d0d6,
        flowers: [0xffffff, 0xf7fbff], particleColor: 0xffffff, particleOpacity: 0.92,
        particleScale: 0.85, windX: 0.002, windZ: 0.0005, fallSpeed: 0.011, glass: 0xf2f8ff
      }
    };

    function setSeason(name) {
      const cfg = seasonalConfigs[name];
      seasonState.current = name;
      groundMaterial.color.setHex(cfg.ground);
      wallsMaterial.color.setHex(cfg.wall);
      roofMaterial.color.setHex(cfg.roof);
      eavesMaterial.color.setHex(cfg.eaves);
      foundationMaterial.color.setHex(cfg.foundation);
      glassMaterial.color.setHex(cfg.glass);
      [flowerBed1, flowerBed2].forEach((bed, i) => {
        bed.userData.flowerMaterials.forEach(mat => mat.color.setHex(cfg.flowers[i % cfg.flowers.length]));
      });
      seasonState.particleColor.setHex(cfg.particleColor);
      seasonState.particleOpacity = cfg.particleOpacity;
      seasonState.particleScale = cfg.particleScale;
      seasonState.windX = cfg.windX;
      seasonState.windZ = cfg.windZ;
      seasonState.fallSpeed = cfg.fallSpeed;
      for (let i = 0; i < particleMaterials.length; i++) {
        particleMaterials[i].map = seasonTextures[name];
        particleMaterials[i].color.copy(seasonState.particleColor);
        particleMaterials[i].opacity = seasonState.particleOpacity;
        particleMaterials[i].needsUpdate = true;
      }
      document.querySelectorAll(".season-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.season === name);
      });
      phaseChip.textContent = `季節: ${playlist.find(p => p.key === name)?.label ?? name}`;
    }

    const timeConfigs = {
      day: {
        label: "昼", background: 0xdff4ff, fog: 0xdff4ff,
        ambient: { color: 0xffffff, intensity: 1.45 },
        sun: { color: 0xfff2db, intensity: 1.85 },
        fill: { color: 0xe8f6ff, intensity: 0.65 },
        moon: { color: 0xcfe6ff, intensity: 0.00 },
        starsOpacity: 0.0, windowGlow: 0.0, glassOpacity: 0.50,
        cloudColor: 0xf4fbff, cloudOpacity: 0.72
      },
      sunset: {
        label: "夕方", background: 0xffc8a8, fog: 0xffd1b6,
        ambient: { color: 0xffead8, intensity: 1.08 },
        sun: { color: 0xffa85c, intensity: 1.35 },
        fill: { color: 0xffdcb8, intensity: 0.34 },
        moon: { color: 0xcfe6ff, intensity: 0.08 },
        starsOpacity: 0.08, windowGlow: 0.18, glassOpacity: 0.55,
        cloudColor: 0xff9e7a, cloudOpacity: 0.58
      },
      night: {
        label: "夜", background: 0x081120, fog: 0x13203d,
        ambient: { color: 0x9db8e8, intensity: 0.46 },
        sun: { color: 0x6f89b8, intensity: 0.10 },
        fill: { color: 0x6c85b8, intensity: 0.10 },
        moon: { color: 0xcfe6ff, intensity: 0.78 },
        starsOpacity: 1.0, windowGlow: 0.75, glassOpacity: 0.34,
        cloudColor: 0x6b7898, cloudOpacity: 0.0
      }
    };

    let currentTimeOfDay = "day";
    function setTimeOfDay(name) {
      currentTimeOfDay = name;
      const cfg = timeConfigs[name];
      scene.background.setHex(cfg.background);
      scene.fog.color.setHex(cfg.fog);
      ambientLight.color.setHex(cfg.ambient.color);
      ambientLight.intensity = cfg.ambient.intensity;
      sunLight.color.setHex(cfg.sun.color);
      sunLight.intensity = cfg.sun.intensity;
      fillLight.color.setHex(cfg.fill.color);
      fillLight.intensity = cfg.fill.intensity;
      moonLight.color.setHex(cfg.moon.color);
      moonLight.intensity = cfg.moon.intensity;
      starMaterial.opacity = cfg.starsOpacity;
      glassMaterial.opacity = cfg.glassOpacity;
      clouds.forEach(cloud => {
        cloud.userData.material.color.setHex(cfg.cloudColor);
        cloud.userData.material.opacity = cfg.cloudOpacity;
      });
      glowWindows.forEach(glow => { glow.material.opacity = cfg.windowGlow; });
      if (name === "night") twinkleMaterial.opacity = 0.55;
      else twinkleMaterial.opacity = 0.0;
      timeChip.textContent = `時間帯: ${cfg.label}`;
    }

    // -----------------------------
    // 音楽と季節の同期
    // 1曲の中で 昼 -> 夕 -> 夜 に進みます
    // 曲が終わると次の季節へ自動遷移
    // -----------------------------
    let currentTrackIndex = 0;
    let isPlaying = false;
    let audioEnabled = true;
    let autoRotate = true;

    function formatTime(sec) {
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, "0")}`;
    }

    function getTrackPhase(trackSec, totalSec) {
      const ratio = totalSec > 0 ? trackSec / totalSec : 0;
      if (ratio < 1/3) return "day";
      if (ratio < 2/3) return "sunset";
      return "night";
    }

    function loadTrack(index, shouldPlay = false) {
      currentTrackIndex = (index + playlist.length) % playlist.length;
      const item = playlist[currentTrackIndex];
      audio.src = item.file;
      audio.load();
      setSeason(item.key);
      setTimeOfDay("day");
      trackChip.textContent = `曲: ${item.emoji} ${item.label} (${formatTime(item.duration)})`;
      phaseChip.textContent = `季節: ${item.label}`;
      statusLine.textContent = `読み込み: ${item.file}`;
      if (shouldPlay && audioEnabled) {
        audio.play().then(() => {
          isPlaying = true;
          playBtn.textContent = "⏸ 一時停止";
          statusLine.textContent = `再生中: ${item.file}`;
        }).catch(() => {
          isPlaying = false;
          playBtn.textContent = "▶ 再生";
          statusLine.textContent = `音声の自動再生がブロックされました。再生ボタンを押してください。`;
        });
      }
    }

    function nextTrack() {
      loadTrack(currentTrackIndex + 1, true);
    }

    async function togglePlay() {
      if (!audio.src) loadTrack(currentTrackIndex, false);
      if (audio.paused) {
        try {
          await audio.play();
          isPlaying = true;
          playBtn.textContent = "⏸ 一時停止";
          statusLine.textContent = `再生中: ${playlist[currentTrackIndex].file}`;
        } catch {
          statusLine.textContent = "再生できませんでした。mp3 が同じフォルダにあるか確認してください。";
        }
      } else {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = "▶ 再生";
        statusLine.textContent = `一時停止: ${playlist[currentTrackIndex].file}`;
      }
    }


    async function enterRecordingMode() {
      document.body.classList.add("recording");
      controls.enabled = false;
      statusLine.textContent = "録画モード準備中…";
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        }
      } catch (e) {
        // フルスクリーン非対応でも続行
      }
      setTimeout(async () => {
        if (!audio.src) loadTrack(currentTrackIndex, false);
        if (audio.paused) {
          await togglePlay();
        }
        statusLine.textContent = "録画モード再生中";
      }, 800);
    }

    recordBtn.addEventListener("click", async () => {

  try {
    await document.documentElement.requestFullscreen();
  } catch(e) {}

  document.body.classList.add("recording");

  setTimeout(() => {
    startMusicAndSeasonCycle();
  }, 3000);

});

    playBtn.addEventListener("click", togglePlay);
    document.querySelectorAll(".season-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = playlist.findIndex(p => p.key === btn.dataset.season);
        loadTrack(idx, isPlaying || !audio.paused);
      });
    });

    audio.addEventListener("ended", () => {
      nextTrack();
    });

    audio.addEventListener("timeupdate", () => {
      const item = playlist[currentTrackIndex];
      const total = audio.duration && Number.isFinite(audio.duration) ? audio.duration : item.duration;
      const current = Math.min(audio.currentTime, total);
      const remain = Math.max(0, total - current);
      remainChip.textContent = `残り: ${formatTime(remain)}`;
      const phase = getTrackPhase(current, total);
      setTimeOfDay(phase);
    });

    audio.addEventListener("error", () => {
      statusLine.textContent = `音声を読み込めません: ${playlist[currentTrackIndex].file}`;
    });

    window.addEventListener("keydown", async (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") autoRotate = !autoRotate;
      if (key === "m") {
        audioEnabled = !audioEnabled;
        if (!audioEnabled) {
          audio.pause();
          isPlaying = false;
          playBtn.textContent = "▶ 再生";
          statusLine.textContent = "音楽OFF";
        } else {
          statusLine.textContent = "音楽ON";
        }
      }
      if (e.code === "Space") {
        e.preventDefault();
        await togglePlay();
      }
    });

    const clock = new THREE.Clock();

    function updateParticles(t) {
      for (let i = 0; i < seasonParticles.length; i++) {
        const p = seasonParticles[i];
        const v = particleVelocities[i];
        const pulse = 0.85 + Math.sin(t * 2.2 + i * 0.17) * 0.08;
        p.position.x += v.x + seasonState.windX;
        p.position.y -= seasonState.fallSpeed + Math.abs(v.y) * 0.2;
        p.position.z += v.z + seasonState.windZ * Math.sin(t + i);
        p.material.rotation += v.rot * 0.08;
        const baseSize = seasonState.particleScale * pulse;
        p.scale.set(baseSize, baseSize, 1);
        if (seasonState.current === "spring") {
          p.material.rotation += 0.02;
          p.position.x += Math.sin(t * 2 + i) * 0.002;
        } else if (seasonState.current === "summer") {
          p.position.y += Math.sin(t * 4 + i) * 0.01;
          p.position.x += Math.cos(t * 2.5 + i) * 0.003;
        } else if (seasonState.current === "autumn") {
          p.material.rotation += 0.04;
          p.position.x += Math.sin(t * 3 + i) * 0.004;
          p.position.z += Math.cos(t * 2 + i) * 0.003;
        } else if (seasonState.current === "winter") {
          p.position.x += Math.sin(t * 1.2 + i) * 0.002;
          p.material.rotation += 0.008;
        }
        if (p.position.y < -1 || p.position.x < -12 || p.position.x > 12 || p.position.z < -12 || p.position.z > 12) {
          resetParticle(p);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      if (autoRotate) {
        staticGroup.rotation.y += 0.0032;
        backgroundGroup.rotation.y += 0.0008;
      }

      clouds.forEach((cloud, i) => {
        cloud.position.x += 0.004 + i * 0.0006;
        if (cloud.position.x > 18) cloud.position.x = -18;
        cloud.position.z += Math.sin(t * 0.25 + i) * 0.0015;
        cloud.position.y += Math.sin(t * 0.4 + i * 1.3) * 0.0015;
      });

      if (currentTimeOfDay === "night") {
        twinkleMaterial.opacity = 0.28 + (Math.sin(t * 2.8) * 0.12) + (Math.sin(t * 7.4) * 0.08);
        twinkleStars.rotation.y += 0.0006;
      } else {
        twinkleMaterial.opacity = 0.0;
      }

      glassHighlight.rotation.y += 0.0012;
      glassHighlight.rotation.x = Math.sin(t * 0.35) * 0.03;

      updateParticles(t);
      updateSmoke();
      controls.update();
      renderer.render(scene, camera);
    }

    setSeason("spring");
    setTimeOfDay("day");
    loadTrack(0, false);
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
