<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>四季の家 - 最初の立体家</title>
  <style>
    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at top, #a9d6ff 0%, #dff2ff 35%, #eef8ff 65%, #f8fcff 100%);
      font-family:sans-serif;
    }

    #info{
      position:fixed;
      left:14px;
      top:14px;
      z-index:10;
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.78);
      color:#234;
      font-size:14px;
      line-height:1.6;
      backdrop-filter:blur(8px);
      box-shadow:0 8px 24px rgba(0,0,0,0.10);
    }

    #info b{
      font-size:15px;
    }
  </style>
</head>
<body>
  <div id="info">
    <b>🏠 最初の立体家</b><br>
    ドラッグ: 回転<br>
    ホイール: 拡大縮小<br>
    右ドラッグ: 平行移動
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.179.1/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xeef8ff, 18, 52);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(10, 7, 12);

    const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2.2, 0);

    // 光
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
    sunLight.position.set(8, 14, 10);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048;
    sunLight.shadow.mapSize.height = 2048;
    sunLight.shadow.camera.left = -20;
    sunLight.shadow.camera.right = 20;
    sunLight.shadow.camera.top = 20;
    sunLight.shadow.camera.bottom = -20;
    scene.add(sunLight);

    // 全体グループ
    const houseGroup = new THREE.Group();
    scene.add(houseGroup);

    // 地面
    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(18, 64),
      new THREE.MeshStandardMaterial({
        color:0x9fd27a,
        roughness:1
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 家の土台
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(5.2, 3.6, 5.2),
      new THREE.MeshStandardMaterial({
        color:0xf7efe4,
        roughness:0.9
      })
    );
    base.position.y = 1.8;
    base.castShadow = true;
    base.receiveShadow = true;
    houseGroup.add(base);

    // 屋根
    const roof = new THREE.Mesh(
      new THREE.ConeGeometry(4.2, 2.2, 4),
      new THREE.MeshStandardMaterial({
        color:0x8c3b2f,
        roughness:0.95
      })
    );
    roof.position.y = 4.7;
    roof.rotation.y = Math.PI / 4;
    roof.castShadow = true;
    roof.receiveShadow = true;
    houseGroup.add(roof);

    // ドア
    const door = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 2.0, 0.14),
      new THREE.MeshStandardMaterial({
        color:0x6e4a2f,
        roughness:0.9
      })
    );
    door.position.set(0, 1.0, 2.67);
    door.castShadow = true;
    houseGroup.add(door);

    // ドアノブ
    const knob = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 16, 16),
      new THREE.MeshStandardMaterial({
        color:0xf4d27a,
        metalness:0.7,
        roughness:0.25
      })
    );
    knob.position.set(0.3, 1.0, 2.76);
    knob.castShadow = true;
    houseGroup.add(knob);

    // 窓
    function createWindow(x, y, z, rotY = 0){
      const frame = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.0, 0.12),
        new THREE.MeshStandardMaterial({
          color:0xffffff,
          roughness:0.85
        })
      );
      frame.position.set(x, y, z);
      frame.rotation.y = rotY;
      frame.castShadow = true;

      const glass = new THREE.Mesh(
        new THREE.BoxGeometry(0.92, 0.72, 0.07),
        new THREE.MeshStandardMaterial({
          color:0xbfe7ff,
          transparent:true,
          opacity:0.82,
          roughness:0.12,
          metalness:0.05
        })
      );
      glass.position.set(0, 0, 0.05);
      frame.add(glass);

      return frame;
    }

    houseGroup.add(createWindow(-1.5, 2.0, 2.67, 0));
    houseGroup.add(createWindow( 1.5, 2.0, 2.67, 0));
    houseGroup.add(createWindow( 2.67, 2.0, 0, Math.PI / 2));
    houseGroup.add(createWindow(-2.67, 2.0, 0, Math.PI / 2));

    // 煙突
    const chimney = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 1.6, 0.6),
      new THREE.MeshStandardMaterial({
        color:0xb06e57,
        roughness:1
      })
    );
    chimney.position.set(1.35, 5.35, 0.5);
    chimney.castShadow = true;
    chimney.receiveShadow = true;
    houseGroup.add(chimney);

    // 木
    function createTree(x, z){
      const tree = new THREE.Group();

      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.28, 2.0, 10),
        new THREE.MeshStandardMaterial({
          color:0x7a4f2a,
          roughness:1
        })
      );
      trunk.position.y = 1.0;
      trunk.castShadow = true;
      trunk.receiveShadow = true;
      tree.add(trunk);

      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.15, 20, 20),
        new THREE.MeshStandardMaterial({
          color:0x5bbf5b,
          roughness:0.95
        })
      );
      leaves.position.y = 2.5;
      leaves.castShadow = true;
      leaves.receiveShadow = true;
      tree.add(leaves);

      tree.position.set(x, 0, z);
      return tree;
    }

    const tree1 = createTree(-5.2, -1.8);
    const tree2 = createTree(5.0, 1.4);
    scene.add(tree1, tree2);

    // 小道
    const path = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.03, 6.0),
      new THREE.MeshStandardMaterial({
        color:0xd8c6a5,
        roughness:1
      })
    );
    path.position.set(0, 0.02, 5.0);
    path.receiveShadow = true;
    scene.add(path);

    // ぐるっと回転
    let autoRotate = true;

    window.addEventListener("keydown", (e) => {
      if(e.key.toLowerCase() === "r"){
        autoRotate = !autoRotate;
      }
    });

    // アニメーション
    const clock = new THREE.Clock();

    function animate(){
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      if(autoRotate){
        houseGroup.rotation.y += 0.004;
      }

      // 木をほんの少し揺らす
      tree1.rotation.z = Math.sin(t * 1.3) * 0.02;
      tree2.rotation.z = Math.sin(t * 1.1 + 1.2) * 0.02;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // リサイズ対応
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
