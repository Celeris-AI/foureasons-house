<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ocean Coral - Stable Record Version</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #status {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    color: #fff;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at center, rgba(10,30,50,0.25), rgba(0,0,0,0.62));
    color: white;
    text-align: center;
    padding: 24px;
    cursor: pointer;
  }

  #startOverlay.hidden {
    display: none;
  }

  #startCard {
    max-width: 560px;
    padding: 22px 26px;
    border-radius: 24px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 10px 36px rgba(0,0,0,0.30);
    backdrop-filter: blur(8px);
  }

  #startCard h1 {
    margin: 0 0 10px;
    font-size: 24px;
  }

  #startCard p {
    margin: 0;
    line-height: 1.8;
    font-size: 14px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="status">背景と映像を読み込み中…</div>

<div id="startOverlay">
  <div id="startCard">
    <h1>🪸🎵 クリックで開始</h1>
    <p>
      背景が見えていれば準備OKです。<br>
      クリックすると、音楽つき録画が始まり、3分30秒後に自動保存されます。
    </p>
  </div>
</div>

<audio id="bgm" src="music.mp3" preload="auto" crossorigin="anonymous"></audio>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const RECORD_SECONDS = 210;
const statusEl = document.getElementById("status");
const startOverlay = document.getElementById("startOverlay");
const bgm = document.getElementById("bgm");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2.7, 14);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, -1.15, -6.2);

const loader = new THREE.TextureLoader();

/* ==========
   ライト
========== */
scene.add(new THREE.AmbientLight(0xffffff, 1.42));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.75);
dirLight.position.set(8, 11, 9);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xdff4ff, 0.90);
fillLight.position.set(-8, 5, -6);
scene.add(fillLight);

/* ==========
   背景
========== */
const bgGroup = new THREE.Group();
scene.add(bgGroup);

let bgPlane = null;

loader.load("sea_bg.png", (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;

  const bgMaterial = new THREE.MeshBasicMaterial({
    map: texture,
    depthWrite: false
  });

  bgPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 1),
    bgMaterial
  );
  bgPlane.position.set(0, 1.2, -24);
  bgGroup.add(bgPlane);

  fitBackgroundToView(texture);
  statusEl.textContent = "準備OK：中央をクリックで録画開始";
}, undefined, (err) => {
  console.error("sea_bg.png の読み込み失敗", err);
  statusEl.textContent = "sea_bg.png の読み込みに失敗しました";
});

function fitBackgroundToView(texture) {
  if (!bgPlane || !texture || !texture.image) return;

  const distance = Math.abs(camera.position.z - bgPlane.position.z);
  const vFov = THREE.MathUtils.degToRad(camera.fov);

  const viewHeight = 2 * Math.tan(vFov / 2) * distance;
  const viewWidth = viewHeight * camera.aspect;

  const imageAspect = texture.image.width / texture.image.height;
  const viewAspect = viewWidth / viewHeight;

  let planeWidth, planeHeight;

  if (viewAspect > imageAspect) {
    planeWidth = viewWidth;
    planeHeight = planeWidth / imageAspect;
  } else {
    planeHeight = viewHeight;
    planeWidth = planeHeight * imageAspect;
  }

  bgPlane.scale.set(planeWidth, planeHeight, 1);
}

/* 海前景 */
const frontOceanPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 12),
  new THREE.MeshBasicMaterial({
    color: 0x4d95c8,
    transparent: true,
    opacity: 0.16,
    depthWrite: false
  })
);
frontOceanPlane.position.set(0, -4.4, -8);
scene.add(frontOceanPlane);

function makeShimmerTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 512;
  const ctx = canvas.getContext("2d");

  const grad1 = ctx.createRadialGradient(120, 90, 10, 120, 90, 160);
  grad1.addColorStop(0, "rgba(255,255,255,0.35)");
  grad1.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad1;
  ctx.fillRect(0, 0, 512, 512);

  const grad2 = ctx.createRadialGradient(360, 120, 8, 360, 120, 130);
  grad2.addColorStop(0, "rgba(255,255,255,0.18)");
  grad2.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, 512, 512);

  for (let i = 0; i < 90; i++) {
    const y = Math.random() * 512;
    const h = 1 + Math.random() * 3;
    const alpha = 0.02 + Math.random() * 0.05;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fillRect(0, y, 512, h);
  }

  return new THREE.CanvasTexture(canvas);
}

const shimmerTexture = makeShimmerTexture();
const shimmerPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 10),
  new THREE.MeshBasicMaterial({
    map: shimmerTexture,
    transparent: true,
    opacity: 0.48,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
shimmerPlane.position.set(0, -4.6, -7.4);
scene.add(shimmerPlane);

/* ==========
   ワールド
========== */
const world = new THREE.Group();
world.position.set(0, -0.95, -6.25);
scene.add(world);

/* ==========
   サンゴ
========== */
const coralGroup = new THREE.Group();
coralGroup.position.set(0, -3.42, 0.70);
world.add(coralGroup);

const coralTexture = loader.load("sango.png");
coralTexture.colorSpace = THREE.SRGBColorSpace;

const coral = new THREE.Mesh(
  new THREE.PlaneGeometry(5.0, 3.9),
  new THREE.MeshBasicMaterial({
    map: coralTexture,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false
  })
);
coral.position.set(0, 1.12, 0);
coral.renderOrder = 20;
coralGroup.add(coral);

/* 水面 */
const waterPlane = new THREE.Mesh(
  new THREE.CircleGeometry(2.7, 80),
  new THREE.MeshBasicMaterial({
    color: 0x9fdcff,
    transparent: true,
    opacity: 0.10,
    depthWrite: false
  })
);
waterPlane.rotation.x = -Math.PI / 2;
waterPlane.position.set(0, -3.55, 0);
world.add(waterPlane);

const waterGlow = new THREE.Mesh(
  new THREE.CircleGeometry(2.95, 80),
  new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.05,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
waterGlow.rotation.x = -Math.PI / 2;
waterGlow.position.set(0, -3.52, 0);
world.add(waterGlow);

/* ==========
   テクスチャ
========== */
function makePetalTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.rotate(-0.35);

  const grad = ctx.createRadialGradient(-8, -12, 4, 0, 0, 40);
  grad.addColorStop(0, "rgba(255,240,248,1)");
  grad.addColorStop(1, "rgba(255,160,205,0.98)");
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -32);
  ctx.bezierCurveTo(28, -22, 30, 10, 0, 34);
  ctx.bezierCurveTo(-24, 10, -22, -22, 0, -32);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 4, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.28, "rgba(255,250,180,0.95)");
  grad.addColorStop(0.62, "rgba(255,225,120,0.50)");
  grad.addColorStop(1, "rgba(255,220,120,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeLeafTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.rotate(0.2);

  const grad = ctx.createLinearGradient(-20, -30, 20, 30);
  grad.addColorStop(0, "rgba(255,185,70,1)");
  grad.addColorStop(0.5, "rgba(220,110,30,1)");
  grad.addColorStop(1, "rgba(168,70,22,1)");
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -34);
  ctx.bezierCurveTo(26, -12, 22, 28, 0, 36);
  ctx.bezierCurveTo(-22, 28, -28, -12, 0, -34);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeSnowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  ctx.translate(64, 64);
  ctx.strokeStyle = "rgba(255,255,255,0.98)";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";

  for (let i = 0; i < 6; i++) {
    ctx.save();
    ctx.rotate((Math.PI / 3) * i);
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(0, 30);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -14); ctx.lineTo(-7, -7);
    ctx.moveTo(0, -14); ctx.lineTo(7, -7);
    ctx.moveTo(0, 14);  ctx.lineTo(-7, 7);
    ctx.moveTo(0, 14);  ctx.lineTo(7, 7);
    ctx.stroke();
    ctx.restore();
  }

  return new THREE.CanvasTexture(canvas);
}

function makeSmokeTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 50);
  grad.addColorStop(0, "rgba(255,255,255,0.72)");
  grad.addColorStop(0.45, "rgba(240,240,245,0.46)");
  grad.addColorStop(0.80, "rgba(220,225,235,0.18)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 50, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

const texSakura = makePetalTexture();
const texLight  = makeGlowTexture();
const texLeaf   = makeLeafTexture();
const texSnow   = makeSnowTexture();
const texSmoke  = makeSmokeTexture();

/* ==========
   季節パーティクル
========== */
const zoneConfigs = [
  { texture: texSakura, xMin: -15.80, xMax: -13.20, yMin: -3.30, yMax: 1.8, opacity: 0.95, scaleMin: 0.22, scaleMax: 0.34, speed: 0.010, kind: "sakura" },
  { texture: texLight,  xMin: -8.90, xMax: -6.30, yMin: -3.20, yMax: 2.1, opacity: 0.88, scaleMin: 0.14, scaleMax: 0.22, speed: 0.013, kind: "light"  },
  { texture: texLeaf,   xMin:  6.30, xMax:  8.90, yMin: -3.30, yMax: 1.8, opacity: 0.93, scaleMin: 0.22, scaleMax: 0.34, speed: 0.010, kind: "leaf"   },
  { texture: texSnow,   xMin:  13.20, xMax:  15.80, yMin: -3.25, yMax: 1.9, opacity: 0.92, scaleMin: 0.16, scaleMax: 0.25, speed: 0.008, kind: "snow"   }
];

const seasonalGroup = new THREE.Group();
world.add(seasonalGroup);

const seasonalParticles = [];

function resetSeasonParticle(p, zone, first = false) {
  p.userData.zone = zone;
  p.position.x = zone.xMin + Math.random() * (zone.xMax - zone.xMin);
  p.position.z = (Math.random() - 0.5) * 1.2;
  p.position.y = first
    ? zone.yMin + Math.random() * (zone.yMax - zone.yMin)
    : zone.yMin + Math.random() * 0.12;

  p.material.map = zone.texture;
  p.material.opacity = zone.opacity;
  p.material.rotation = Math.random() * Math.PI;

  const s = zone.scaleMin + Math.random() * (zone.scaleMax - zone.scaleMin);
  p.scale.set(s, s, 1);
  p.userData.seed = Math.random() * Math.PI * 2;
}

zoneConfigs.forEach(zone => {
  const count = zone.kind === "light" ? 36 : 44;
  for (let i = 0; i < count; i++) {
    const mat = new THREE.SpriteMaterial({
      map: zone.texture,
      transparent: true,
      opacity: zone.opacity,
      depthWrite: false,
      depthTest: true,
      color: 0xffffff
    });
    const sprite = new THREE.Sprite(mat);
    seasonalGroup.add(sprite);
    seasonalParticles.push(sprite);
    resetSeasonParticle(sprite, zone, true);
  }
});

function updateSeasonParticles(t) {
  for (const p of seasonalParticles) {
    const z = p.userData.zone;

    p.position.y += z.speed + Math.random() * 0.0015;

    if (z.kind === "sakura") {
      p.position.x += Math.sin(t * 1.8 + p.userData.seed) * 0.004;
      p.material.rotation += 0.01;
    } else if (z.kind === "light") {
      p.position.x += Math.sin(t * 2.4 + p.userData.seed) * 0.0025;
      p.position.y += Math.sin(t * 2.6 + p.userData.seed) * 0.0018;
      p.material.rotation += 0.002;
    } else if (z.kind === "leaf") {
      p.position.x += Math.sin(t * 1.7 + p.userData.seed) * 0.0035;
      p.position.z += Math.cos(t * 1.4 + p.userData.seed) * 0.003;
      p.material.rotation += 0.015;
    } else if (z.kind === "snow") {
      p.position.x += Math.sin(t * 1.2 + p.userData.seed) * 0.0018;
      p.material.rotation += 0.004;
    }

    if (p.position.y > z.yMax) {
      resetSeasonParticle(p, z, false);
    }
  }
}

/* けむり */
const smokeGroup = new THREE.Group();
coralGroup.add(smokeGroup);

const smokeParticles = [];
for (let i = 0; i < 28; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texSmoke,
    transparent: true,
    opacity: 0.42,
    depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  sp.renderOrder = 21;
  smokeGroup.add(sp);
  smokeParticles.push(sp);
  resetSmoke(sp, true);
}

function resetSmoke(p, first = false) {
  p.position.set(
    (Math.random() - 0.5) * 0.34,
    first ? 0.72 + Math.random() * 1.1 : 0.72,
    0.12 + (Math.random() - 0.5) * 0.12
  );

  const s = 0.18 + Math.random() * 0.16;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.30 + Math.random() * 0.14;
  p.userData.seed = Math.random() * Math.PI * 2;
}

function updateSmoke(t) {
  for (const p of smokeParticles) {
    p.position.y += 0.010;
    p.position.x += Math.sin(t * 1.5 + p.userData.seed) * 0.0028;
    p.position.z += Math.cos(t * 1.2 + p.userData.seed) * 0.0016;
    p.scale.x += 0.0015;
    p.scale.y += 0.0015;
    p.material.opacity -= 0.0014;

    if (p.position.y > 2.8 || p.material.opacity <= 0.02) {
      resetSmoke(p, false);
    }
  }
}

/* 船 */
function makeShip(filename, x, y, z, width, height, dir, speed) {
  const tex = loader.load(filename);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(width, height),
    new THREE.MeshBasicMaterial({
      map: tex,
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false
    })
  );
  mesh.position.set(x, y, z);
  mesh.userData = { dir, speed, startZ: z, baseY: y };
  return mesh;
}

const RIGHT_OUT = 30;
const LEFT_OUT = -30;

const ships = [
  makeShip("ship1.png", RIGHT_OUT + 2.0, -2.98, -1.00, 2.55, 1.74, -1, 0.026),
  makeShip("ship2.png", RIGHT_OUT + 8.0, -3.08, -1.18, 2.23, 1.54, -1, 0.020),
  makeShip("ship3.png", LEFT_OUT - 2.0, -2.94, -0.90, 2.43, 1.64, 1, 0.024),
  makeShip("ship4.png", LEFT_OUT - 8.0, -3.10, -1.26, 2.12, 1.46, 1, 0.018)
];

ships.forEach(s => {
  s.renderOrder = 5;
  world.add(s);
});

function updateShips(t) {
  ships.forEach((ship, i) => {
    ship.position.x += ship.userData.dir * ship.userData.speed;
    ship.position.y = ship.userData.baseY + Math.sin(t * (1.3 + i * 0.12) + i) * 0.010;
    ship.position.z = ship.userData.startZ;

    if (ship.userData.dir < 0 && ship.position.x < LEFT_OUT - 2.5) {
      ship.position.x = RIGHT_OUT + 2.5;
    }

    if (ship.userData.dir > 0 && ship.position.x > RIGHT_OUT + 2.5) {
      ship.position.x = LEFT_OUT - 2.5;
    }
  });
}

/* きらめき */
const sparkleGroup = new THREE.Group();
world.add(sparkleGroup);

for (let i = 0; i < 16; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.022, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.7
    })
  );

  const rr = 2.1 * Math.random();
  const aa = Math.random() * Math.PI * 2;
  const yy = -2.7 + Math.random() * 4.2;

  s.position.set(
    Math.cos(aa) * rr * 0.55,
    yy,
    Math.sin(aa) * rr * 0.55
  );

  s.userData = {
    baseY: s.position.y,
    phase: Math.random() * Math.PI * 2
  };

  sparkleGroup.add(s);
}

/* ==========
   録画
========== */
let audioCtx = null;
let audioSourceNode = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let autoStopTimer = null;

async function startAll() {
  try {
    statusEl.textContent = "録画準備中…";

    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === "suspended") {
      await audioCtx.resume();
    }

    if (!audioSourceNode) {
      audioSourceNode = audioCtx.createMediaElementSource(bgm);
    }

    const destination = audioCtx.createMediaStreamDestination();
    audioSourceNode.connect(destination);
    audioSourceNode.connect(audioCtx.destination);

    const canvasStream = renderer.domElement.captureStream(60);
    const mixedStream = new MediaStream();

    canvasStream.getVideoTracks().forEach(track => mixedStream.addTrack(track));
    destination.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    let mimeType = "";
    const mimeTypes = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    for (const type of mimeTypes) {
      if (MediaRecorder.isTypeSupported(type)) {
        mimeType = type;
        break;
      }
    }

    mediaRecorder = new MediaRecorder(
      mixedStream,
      mimeType
        ? { mimeType, videoBitsPerSecond: 12000000 }
        : { videoBitsPerSecond: 12000000 }
    );

    recordedChunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "ocean_coral_record.webm";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);

      statusEl.textContent = "保存しました ✨";
      isRecording = false;
    };

    bgm.currentTime = 0;
    bgm.loop = false;
    bgm.volume = 1.0;

    mediaRecorder.start(200);
    await bgm.play();

    isRecording = true;
    statusEl.textContent = "録画中… 3分30秒後に自動保存されます 🎵";

    autoStopTimer = setTimeout(() => {
      stopAll();
    }, RECORD_SECONDS * 1000);

  } catch (err) {
    console.error(err);
    statusEl.textContent = "開始に失敗しました。music.mp3 やブラウザ設定を確認してください";
    startOverlay.classList.remove("hidden");
  }
}

function stopAll() {
  if (!isRecording) return;

  bgm.pause();

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }

  statusEl.textContent = "保存中…";
}

bgm.addEventListener("ended", () => {
  if (isRecording) stopAll();
});

startOverlay.addEventListener("click", async () => {
  startOverlay.classList.add("hidden");
  await startAll();
});

/* ==========
   アニメーション
========== */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateSeasonParticles(t);
  updateSmoke(t);
  updateShips(t);

  waterPlane.material.opacity = 0.08 + Math.sin(t * 1.5) * 0.015;
  waterGlow.material.opacity = 0.04 + Math.sin(t * 2.2) * 0.012;

  shimmerPlane.material.opacity = 0.36 + Math.sin(t * 1.6) * 0.12;
  shimmerPlane.position.y = -4.6 + Math.sin(t * 0.7) * 0.06;
  shimmerTexture.offset.y -= 0.0009;

  sparkleGroup.children.forEach((p, i) => {
    p.position.y = p.userData.baseY + Math.sin(t * 1.7 + p.userData.phase) * 0.025;
    p.material.opacity = 0.38 + 0.22 * Math.sin(t * 2.0 + i);
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  if (bgPlane && bgPlane.material.map) {
    fitBackgroundToView(bgPlane.material.map);
  }
});
</script>
</body>
</html>
