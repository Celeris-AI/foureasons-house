<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Circle Triple Colors + Sky Canopy</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #status {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    color: #fff;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(80,120,180,0.12), rgba(0,0,0,0.74));
    color: white;
    text-align: center;
    padding: 24px;
    cursor: pointer;
  }

  #startOverlay.hidden {
    display: none;
  }

  #startCard {
    max-width: 760px;
    padding: 24px 28px;
    border-radius: 24px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 10px 36px rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
  }

  #startCard h1 {
    margin: 0 0 10px;
    font-size: 24px;
  }

  #startCard p {
    margin: 0;
    line-height: 1.8;
    font-size: 14px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="status">三重魔法陣＋上空天蓋術式を読み込み中…</div>

<div id="startOverlay">
  <div id="startCard">
    <h1>✨ クリックで開始</h1>
    <p>
      左はゴールド、中央はサファイアブルー、右はルビーレッドの三重魔法陣。<br>
      さらに上空には、三つを束ねる巨大な天蓋魔法陣が展開されています。<br>
      クリックすると、音楽つき録画が始まり、3分30秒後に自動保存されます。
    </p>
  </div>
</div>

<audio id="bgm" src="music.mp3" preload="auto" crossorigin="anonymous"></audio>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const RECORD_SECONDS = 210;
const statusEl = document.getElementById("status");
const startOverlay = document.getElementById("startOverlay");
const bgm = document.getElementById("bgm");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  48,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 3.2, 18.8);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, -1.25, -6.2);

const loader = new THREE.TextureLoader();

scene.add(new THREE.AmbientLight(0xffffff, 1.22));

const dirLight = new THREE.DirectionalLight(0xe8f4ff, 1.72);
dirLight.position.set(8, 10, 7);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xbfd9ff, 0.72);
fillLight.position.set(-9, 4, -7);
scene.add(fillLight);

const upperLight = new THREE.DirectionalLight(0xd6ebff, 0.52);
upperLight.position.set(0, 12, 2);
scene.add(upperLight);

loader.load("sea_bg.png", (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;
  scene.background = texture;
  statusEl.textContent = "準備OK：中央をクリックで録画開始";
}, undefined, () => {
  scene.background = new THREE.Color(0x03060d);
  statusEl.textContent = "背景画像なしで起動：中央をクリックで録画開始";
});

const frontMist = new THREE.Mesh(
  new THREE.PlaneGeometry(58, 16),
  new THREE.MeshBasicMaterial({
    color: 0x9cc9ff,
    transparent: true,
    opacity: 0.055,
    depthWrite: false
  })
);
frontMist.position.set(0, -4.35, -8.2);
scene.add(frontMist);

const world = new THREE.Group();
world.position.set(0, -0.9, -6.2);
scene.add(world);

function parseHue(hue) {
  const [r, g, b] = hue.split(",").map(v => Number(v.trim()));
  return { r, g, b };
}

function colorFromHue(hue) {
  const { r, g, b } = parseHue(hue);
  return new THREE.Color(r / 255, g / 255, b / 255);
}

function makeMagicCircleTexture(size = 1024, hue = "170,235,255") {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  const cx = size / 2;
  const cy = size / 2;

  ctx.clearRect(0, 0, size, size);

  const bgGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.48);
  bgGlow.addColorStop(0.0, `rgba(${hue},0.12)`);
  bgGlow.addColorStop(0.35, `rgba(${hue},0.06)`);
  bgGlow.addColorStop(1.0, "rgba(0,0,0,0)");
  ctx.fillStyle = bgGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.48, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(${hue},0.95)`;
  ctx.lineWidth = size * 0.004;
  ctx.shadowColor = `rgba(${hue},0.9)`;
  ctx.shadowBlur = size * 0.018;

  function ring(r, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.004 * width;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function polygon(r, sides, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = rotation + (Math.PI * 2 * i) / sides;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function star(rOuter, rInner, points, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOuter : rInner;
      const a = rotation + (Math.PI * i) / points;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function radialLines(r1, r2, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x1 = cx + Math.cos(a) * r1;
      const y1 = cy + Math.sin(a) * r1;
      const x2 = cx + Math.cos(a) * r2;
      const y2 = cy + Math.sin(a) * r2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function runeDots(r, count, dotR, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgba(${hue},0.98)`;
    ctx.shadowColor = `rgba(${hue},1)`;
    ctx.shadowBlur = size * 0.015;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function runeMarks(r, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.003;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(0, size * 0.014);
      ctx.moveTo(-size * 0.008, 0);
      ctx.lineTo(size * 0.008, 0);
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(size * 0.007, -size * 0.022);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  ring(size * 0.44, 0.55, 1.0);
  ring(size * 0.40, 0.85, 1.45);
  ring(size * 0.34, 0.78, 1.0);
  ring(size * 0.24, 0.95, 1.2);
  ring(size * 0.10, 0.92, 1.0);

  polygon(size * 0.365, 6, -Math.PI / 2, 0.55);
  star(size * 0.30, size * 0.12, 8, -Math.PI / 2, 0.95);
  polygon(size * 0.18, 3, -Math.PI / 2, 0.82);

  radialLines(size * 0.245, size * 0.335, 16, 0, 0.45);
  radialLines(size * 0.11, size * 0.22, 8, Math.PI / 8, 0.55);

  runeDots(size * 0.40, 24, size * 0.0055, 0, 0.9);
  runeMarks(size * 0.285, 12, Math.PI / 12, 0.86);

  const coreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.09);
  coreGlow.addColorStop(0, "rgba(255,255,255,1)");
  coreGlow.addColorStop(0.3, `rgba(${hue},0.95)`);
  coreGlow.addColorStop(1, `rgba(${hue},0)`);
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.09, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 3, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.2, "rgba(255,255,255,0.95)");
  grad.addColorStop(0.55, "rgba(255,255,255,0.38)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeSmokeTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 50);
  grad.addColorStop(0, "rgba(220,235,255,0.68)");
  grad.addColorStop(0.45, "rgba(160,180,255,0.26)");
  grad.addColorStop(0.82, "rgba(140,170,255,0.08)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 50, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeBeamTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 512;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.0, "rgba(255,255,255,0)");
  grad.addColorStop(0.12, "rgba(220,240,255,0.48)");
  grad.addColorStop(0.50, "rgba(170,220,255,0.95)");
  grad.addColorStop(0.88, "rgba(220,240,255,0.45)");
  grad.addColorStop(1.0, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 512);

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const texGlow = makeGlowTexture();
const texSmoke = makeSmokeTexture();
const texBeam = makeBeamTexture();

const altarSets = [];

function createMagicCircleSet(config) {
  const {
    x,
    outerHue,
    innerHue,
    glowColor,
    crystalColor,
    emissiveColor,
    auraColor,
    particleColor,
    ringColor,
    rotationScale,
    pulseOffset
  } = config;

  const group = new THREE.Group();
  group.position.x = x;
  world.add(group);

  const floorGlow = new THREE.Mesh(
    new THREE.CircleGeometry(3.5, 96),
    new THREE.MeshBasicMaterial({
      color: glowColor,
      transparent: true,
      opacity: 0.11,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  floorGlow.rotation.x = -Math.PI / 2;
  floorGlow.position.set(0, -3.44, 0);
  group.add(floorGlow);

  const outerMagicTexture = makeMagicCircleTexture(1024, outerHue);
  const innerMagicTexture = makeMagicCircleTexture(1024, innerHue);

  const magicCircleOuter = new THREE.Mesh(
    new THREE.CircleGeometry(3.05, 128),
    new THREE.MeshBasicMaterial({
      map: outerMagicTexture,
      transparent: true,
      opacity: 0.94,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    })
  );
  magicCircleOuter.rotation.x = -Math.PI / 2;
  magicCircleOuter.position.set(0, -3.30, 0.01);
  magicCircleOuter.renderOrder = 10;
  group.add(magicCircleOuter);

  const magicCircleInner = new THREE.Mesh(
    new THREE.CircleGeometry(2.12, 128),
    new THREE.MeshBasicMaterial({
      map: innerMagicTexture,
      transparent: true,
      opacity: 0.86,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    })
  );
  magicCircleInner.rotation.x = -Math.PI / 2;
  magicCircleInner.position.set(0, -3.27, 0.02);
  magicCircleInner.renderOrder = 11;
  group.add(magicCircleInner);

  const crystalGroup = new THREE.Group();
  crystalGroup.position.set(0, -2.0, 0);
  group.add(crystalGroup);

  const crystalCore = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.72, 0),
    new THREE.MeshPhysicalMaterial({
      color: crystalColor,
      emissive: emissiveColor,
      emissiveIntensity: 1.45,
      roughness: 0.05,
      transmission: 0.12,
      transparent: true,
      opacity: 0.92,
      metalness: 0.10,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05
    })
  );
  crystalGroup.add(crystalCore);

  const crystalInner = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.38, 0),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.82,
      blending: THREE.AdditiveBlending
    })
  );
  crystalGroup.add(crystalInner);

  const crystalAura = new THREE.Mesh(
    new THREE.SphereGeometry(0.95, 28, 28),
    new THREE.MeshBasicMaterial({
      color: auraColor,
      transparent: true,
      opacity: 0.08,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  crystalGroup.add(crystalAura);

  const ringGroup = new THREE.Group();
  group.add(ringGroup);

  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.78 + i * 0.28, 0.018, 12, 80),
      new THREE.MeshBasicMaterial({
        color: i === 0 ? 0xffffff : ringColor,
        transparent: true,
        opacity: 0.38 - i * 0.06,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -2.02 + i * 0.42;
    ringGroup.add(ring);
  }

  const particles = [];

  function resetParticle(sprite, first = false) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.30 + Math.random() * 0.95;
    sprite.userData.angle = angle;
    sprite.userData.radius = radius;
    sprite.userData.height = first ? (-3.15 + Math.random() * 5.1) : -3.15;
    sprite.userData.speed = 0.010 + Math.random() * 0.008;
    sprite.userData.spin = 0.010 + Math.random() * 0.014;
    sprite.userData.seed = Math.random() * Math.PI * 2;

    const s = 0.05 + Math.random() * 0.09;
    sprite.scale.set(s, s, 1);
    sprite.material.opacity = 0.38 + Math.random() * 0.28;
  }

  for (let i = 0; i < 34; i++) {
    const mat = new THREE.SpriteMaterial({
      map: texGlow,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
      color: i % 6 === 0 ? 0xffffff : particleColor
    });

    const sprite = new THREE.Sprite(mat);
    group.add(sprite);
    particles.push(sprite);
    resetParticle(sprite, true);
  }

  const shards = [];
  for (let i = 0; i < 8; i++) {
    const shard = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.10 + Math.random() * 0.08, 0),
      new THREE.MeshPhysicalMaterial({
        color: crystalColor,
        emissive: emissiveColor,
        emissiveIntensity: 0.75,
        roughness: 0.12,
        transparent: true,
        opacity: 0.82,
        clearcoat: 1
      })
    );

    const a = (Math.PI * 2 * i) / 8;
    const r = 1.25 + Math.random() * 0.6;
    shard.position.set(
      Math.cos(a) * r,
      -2.5 + Math.random() * 1.4,
      Math.sin(a) * r * 0.34
    );

    shard.userData = {
      baseY: shard.position.y,
      phase: Math.random() * Math.PI * 2,
      rotX: 0.008 + Math.random() * 0.018,
      rotY: 0.008 + Math.random() * 0.018
    };

    group.add(shard);
    shards.push(shard);
  }

  const light = new THREE.PointLight(glowColor, 2.2, 22, 2);
  light.position.set(0, -1.15, 0.1);
  group.add(light);

  return {
    group,
    floorGlow,
    magicCircleOuter,
    magicCircleInner,
    crystalGroup,
    crystalCore,
    crystalInner,
    crystalAura,
    ringGroup,
    particles,
    resetParticle,
    shards,
    light,
    rotationScale,
    pulseOffset
  };
}

altarSets.push(
  createMagicCircleSet({
    x: -15.2,
    outerHue: "255,220,110",
    innerHue: "255,185,70",
    glowColor: 0xffcf5d,
    crystalColor: 0xffe08a,
    emissiveColor: 0xffa81e,
    auraColor: 0xffefbe,
    particleColor: 0xffd36e,
    ringColor: 0xffd36e,
    rotationScale: 0.92,
    pulseOffset: 0.0
  })
);

altarSets.push(
  createMagicCircleSet({
    x: 0,
    outerHue: "90,175,255",
    innerHue: "120,225,255",
    glowColor: 0x6ebdff,
    crystalColor: 0x9fd8ff,
    emissiveColor: 0x2b72ff,
    auraColor: 0x9fd8ff,
    particleColor: 0x9fd8ff,
    ringColor: 0x83c7ff,
    rotationScale: 1.0,
    pulseOffset: 1.2
  })
);

altarSets.push(
  createMagicCircleSet({
    x: 15.2,
    outerHue: "255,86,110",
    innerHue: "255,120,150",
    glowColor: 0xff5d74,
    crystalColor: 0xff92aa,
    emissiveColor: 0xff2748,
    auraColor: 0xffb2bf,
    particleColor: 0xff8ea1,
    ringColor: 0xff8ea1,
    rotationScale: 1.08,
    pulseOffset: 2.3
  })
);

/* -------------------------
   上空巨大魔法陣（天蓋術式）
------------------------- */
const skyTemple = new THREE.Group();
skyTemple.position.set(0, 5.9, -0.7);
world.add(skyTemple);

const skyGlowBase = new THREE.Mesh(
  new THREE.CircleGeometry(15.5, 160),
  new THREE.MeshBasicMaterial({
    color: 0xbfe6ff,
    transparent: true,
    opacity: 0.08,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
skyGlowBase.rotation.x = -1.14;
skyGlowBase.position.y = 0.15;
skyTemple.add(skyGlowBase);

const skyMagicMain = new THREE.Mesh(
  new THREE.CircleGeometry(14.2, 180),
  new THREE.MeshBasicMaterial({
    map: makeMagicCircleTexture(2048, "210,235,255"),
    transparent: true,
    opacity: 0.30,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
skyMagicMain.rotation.x = -1.14;
skyMagicMain.position.set(0, 0.2, 0);
skyMagicMain.renderOrder = 20;
skyTemple.add(skyMagicMain);

const skyMagicInner = new THREE.Mesh(
  new THREE.CircleGeometry(10.6, 180),
  new THREE.MeshBasicMaterial({
    map: makeMagicCircleTexture(2048, "255,255,255"),
    transparent: true,
    opacity: 0.18,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
skyMagicInner.rotation.x = -1.14;
skyMagicInner.position.set(0, 0.32, 0.02);
skyMagicInner.renderOrder = 21;
skyTemple.add(skyMagicInner);

const skyMagicCore = new THREE.Mesh(
  new THREE.CircleGeometry(6.8, 160),
  new THREE.MeshBasicMaterial({
    map: makeMagicCircleTexture(1024, "170,220,255"),
    transparent: true,
    opacity: 0.13,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
skyMagicCore.rotation.x = -1.14;
skyMagicCore.position.set(0, 0.44, 0.04);

const smokeGroup = new THREE.Group();
world.add(smokeGroup);
const smokeParticles = [];

function resetSmoke(p, first = false) {
  p.position.set(
    (Math.random() - 0.5) * 12.6,
    first ? -3.2 + Math.random() * 1.2 : -3.2,
    (Math.random() - 0.5) * 1.6
  );

  const s = 0.55 + Math.random() * 0.9;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.07 + Math.random() * 0.07;
  p.userData.seed = Math.random() * Math.PI * 2;
}

for (let i = 0; i < 28; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texSmoke,
    transparent: true,
    opacity: 0.1,
    depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  smokeGroup.add(sp);
  smokeParticles.push(sp);
  resetSmoke(sp, true);
}

function updateSmoke(t) {
  for (const p of smokeParticles) {
    p.position.y += 0.004;
    p.position.x += Math.sin(t * 0.9 + p.userData.seed) * 0.0025;
    p.scale.x += 0.0008;
    p.scale.y += 0.0008;
    p.material.opacity -= 0.00035;

    if (p.position.y > -0.8 || p.material.opacity <= 0.018) {
      resetSmoke(p, false);
    }
  }
}

let audioCtx = null;
let audioSourceNode = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let autoStopTimer = null;

async function startAll() {
  try {
    statusEl.textContent = "録画準備中…";

    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === "suspended") {
      await audioCtx.resume();
    }

    if (!audioSourceNode) {
      audioSourceNode = audioCtx.createMediaElementSource(bgm);
    }

    const destination = audioCtx.createMediaStreamDestination();
    audioSourceNode.connect(destination);
    audioSourceNode.connect(audioCtx.destination);

    const canvasStream = renderer.domElement.captureStream(60);
    const mixedStream = new MediaStream();

    canvasStream.getVideoTracks().forEach(track => mixedStream.addTrack(track));
    destination.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    let mimeType = "";
    const mimeTypes = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    for (const type of mimeTypes) {
      if (MediaRecorder.isTypeSupported(type)) {
        mimeType = type;
        break;
      }
    }

    mediaRecorder = new MediaRecorder(
      mixedStream,
      mimeType
        ? { mimeType, videoBitsPerSecond: 12000000 }
        : { videoBitsPerSecond: 12000000 }
    );

    recordedChunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "magic_circle_triple_colors_sky_canopy.webm";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);

      statusEl.textContent = "保存しました ✨";
      isRecording = false;
    };

    bgm.currentTime = 0;
    bgm.loop = false;
    bgm.volume = 1.0;

    mediaRecorder.start(200);
    await bgm.play();

    isRecording = true;
    statusEl.textContent = "録画中… 3分30秒後に自動保存されます 🎵";

    autoStopTimer = setTimeout(() => {
      stopAll();
    }, RECORD_SECONDS * 1000);

  } catch (err) {
    console.error(err);
    statusEl.textContent = "開始に失敗しました。music.mp3 やブラウザ設定を確認してください";
    startOverlay.classList.remove("hidden");
  }
}

function stopAll() {
  if (!isRecording) return;

  bgm.pause();

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }

  if (autoStopTimer) {
    clearTimeout(autoStopTimer);
    autoStopTimer = null;
  }

  statusEl.textContent = "保存中…";
}

bgm.addEventListener("ended", () => {
  if (isRecording) stopAll();
});

startOverlay.addEventListener("click", async () => {
  startOverlay.classList.add("hidden");
  await startAll();
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateSmoke(t);

  altarSets.forEach((set, setIndex) => {
    const tt = t + set.pulseOffset;

    set.magicCircleOuter.rotation.z = tt * 0.16 * set.rotationScale;
    set.magicCircleInner.rotation.z = -tt * 0.28 * set.rotationScale;

    set.magicCircleOuter.material.opacity = 0.82 + Math.sin(tt * 1.8) * 0.08;
    set.magicCircleInner.material.opacity = 0.70 + Math.sin(tt * 2.2 + 0.8) * 0.10;

    set.floorGlow.material.opacity = 0.08 + Math.sin(tt * 1.5) * 0.03;

    set.crystalGroup.rotation.y += 0.01;
    set.crystalCore.rotation.x = Math.sin(tt * 0.8) * 0.08;
    set.crystalCore.rotation.z = Math.cos(tt * 0.7) * 0.08;
    set.crystalGroup.position.y = -2.0 + Math.sin(tt * 1.6) * 0.12;

    set.crystalInner.rotation.y -= 0.018;
    set.crystalInner.rotation.x += 0.01;
    set.crystalAura.scale.setScalar(1 + Math.sin(tt * 2.0) * 0.05);

    set.ringGroup.children.forEach((ring, i) => {
      ring.rotation.z = tt * (0.36 + i * 0.08) * (i % 2 === 0 ? 1 : -1);
      ring.position.y = -2.06 + i * 0.42 + Math.sin(tt * 1.8 + i) * 0.05;
      ring.material.opacity = 0.22 + 0.11 * Math.sin(tt * 2.0 + i);
    });

    for (const p of set.particles) {
      p.userData.height += p.userData.speed;
      p.userData.angle += p.userData.spin;

      const wobble = Math.sin(tt * 2.0 + p.userData.seed) * 0.08;
      const r = p.userData.radius + wobble;

      p.position.x = Math.cos(p.userData.angle) * r;
      p.position.z = Math.sin(p.userData.angle) * r * 0.45;
      p.position.y = p.userData.height;

      p.material.opacity = 0.30 + 0.24 * Math.sin(tt * 3.0 + p.userData.seed);

      if (p.userData.height > 2.45) {
        set.resetParticle(p, false);
      }
    }

    set.shards.forEach((s) => {
      s.rotation.x += s.userData.rotX;
      s.rotation.y += s.userData.rotY;
      s.position.y = s.userData.baseY + Math.sin(tt * 1.45 + s.userData.phase) * 0.08;
    });

    set.light.intensity = 1.95 + Math.sin(tt * 2.0 + setIndex) * 0.35;
  });

  // 上空巨大魔法陣のアニメーション
  skyMagicMain.rotation.z = t * 0.045;
  skyMagicInner.rotation.z = -t * 0.075;
  skyMagicCore.rotation.z = t * 0.11;

  skyMagicMain.material.opacity = 0.24 + Math.sin(t * 1.1) * 0.04;
  skyMagicInner.material.opacity = 0.15 + Math.sin(t * 1.4 + 0.8) * 0.03;
  skyMagicCore.material.opacity = 0.11 + Math.sin(t * 1.8 + 1.2) * 0.025;

  skyGlowBase.material.opacity = 0.065 + Math.sin(t * 0.9) * 0.018;
  skyMist.material.opacity = 0.035 + Math.sin(t * 0.7 + 0.5) * 0.015;

  skyHaloRing1.rotation.y = t * 0.12;
  skyHaloRing1.rotation.z = Math.sin(t * 0.6) * 0.08;
  skyHaloRing1.material.opacity = 0.14 + Math.sin(t * 1.3) * 0.03;

  skyHaloRing2.rotation.y = -t * 0.16;
  skyHaloRing2.rotation.z = 0.28 + Math.sin(t * 0.8) * 0.06;
  skyHaloRing2.material.opacity = 0.09 + Math.sin(t * 1.0 + 0.6) * 0.03;

  skyCrownArc.rotation.y = Math.sin(t * 0.4) * 0.1;
  skyCrownArc.material.opacity = 0.16 + Math.sin(t * 1.7 + 0.2) * 0.04;

  skyRays.forEach((beam, i) => {
    beam.material.opacity = (i === 0 ? 0.12 : 0.06) + Math.sin(t * 1.4 + i) * (i === 0 ? 0.025 : 0.015);
    beam.scale.x = 1 + Math.sin(t * 1.2 + i * 1.5) * 0.08;
    beam.position.y = (i === 0 ? -2.3 : -2.0) + Math.sin(t * 0.9 + i) * 0.12;
  });

  skySigilDots.forEach((dot, i) => {
    dot.position.y = dot.userData.baseY + Math.sin(t * 1.7 + dot.userData.phase + i * 0.2) * 0.10;
    dot.material.opacity = 0.38 + Math.sin(t * 2.2 + i) * 0.14;
  });

  skyStarsGroup.children.forEach((star, i) => {
    star.position.x = star.userData.baseX + Math.cos(t * star.userData.drift + star.userData.phase) * 0.18;
    star.position.y = star.userData.baseY + Math.sin(t * (star.userData.drift + 0.25) + star.userData.phase) * 0.12;
    star.position.z = star.userData.baseZ + Math.sin(t * 0.45 + i * 0.3) * 0.06;
    star.material.opacity = 0.20 + 0.30 * Math.sin(t * 1.8 + i);
  });

  sparkleGroup.children.forEach((p, i) => {
    p.position.y = p.userData.baseY + Math.sin(t * 1.6 + p.userData.phase) * 0.06;
    p.position.x = p.userData.baseX + Math.cos(t * 1.4 + p.userData.phase) * 0.03;
    p.position.z = p.userData.baseZ + Math.sin(t * 1.2 + p.userData.phase) * 0.02;
    p.material.opacity = 0.34 + 0.3 * Math.sin(t * 2.0 + i);
  });

  frontMist.material.opacity = 0.035 + Math.sin(t * 0.8) * 0.018;

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
