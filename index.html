<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Circle Crystal World - Auto Record Version</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #status {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    color: #fff;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(80,120,180,0.15), rgba(0,0,0,0.72));
    color: white;
    text-align: center;
    padding: 24px;
    cursor: pointer;
  }

  #startOverlay.hidden {
    display: none;
  }

  #startCard {
    max-width: 620px;
    padding: 24px 28px;
    border-radius: 24px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 10px 36px rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
  }

  #startCard h1 {
    margin: 0 0 10px;
    font-size: 24px;
  }

  #startCard p {
    margin: 0;
    line-height: 1.8;
    font-size: 14px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="status">魔導世界を読み込み中…</div>

<div id="startOverlay">
  <div id="startCard">
    <h1>🔮💎 クリックで開始</h1>
    <p>
      背景が見えていれば準備OKです。<br>
      クリックすると、音楽つき録画が始まり、3分30秒後に自動保存されます。
    </p>
  </div>
</div>

<audio id="bgm" src="music.mp3" preload="auto" crossorigin="anonymous"></audio>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const RECORD_SECONDS = 210;
const statusEl = document.getElementById("status");
const startOverlay = document.getElementById("startOverlay");
const bgm = document.getElementById("bgm");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2.7, 14);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, -0.8, -5.8);

const loader = new THREE.TextureLoader();

/* ==========
   ライト
========== */
scene.add(new THREE.AmbientLight(0xffffff, 1.25));

const dirLight = new THREE.DirectionalLight(0xd9eeff, 1.8);
dirLight.position.set(7, 10, 8);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xa7cfff, 0.8);
fillLight.position.set(-8, 4, -6);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0x8fd3ff, 3.5, 30, 2);
pointLight.position.set(0, -1.0, -6.2);
scene.add(pointLight);

/* ==========
   背景
========== */
loader.load("sea_bg.png", (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;
  scene.background = texture;
  statusEl.textContent = "準備OK：中央をクリックで録画開始";
}, undefined, () => {
  scene.background = new THREE.Color(0x03060d);
  statusEl.textContent = "背景画像なしで起動：中央をクリックで録画開始";
});

/* ==========
   前景の霧と床光
========== */
const frontMist = new THREE.Mesh(
  new THREE.PlaneGeometry(44, 14),
  new THREE.MeshBasicMaterial({
    color: 0x6ab8ff,
    transparent: true,
    opacity: 0.06,
    depthWrite: false
  })
);
frontMist.position.set(0, -4.2, -8);
scene.add(frontMist);

const world = new THREE.Group();
world.position.set(0, -0.9, -6.2);
scene.add(world);

/* ==========
   テクスチャ作成
========== */
function makeMagicCircleTexture(size = 1024, hue = "170,235,255") {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  const cx = size / 2;
  const cy = size / 2;

  ctx.clearRect(0, 0, size, size);

  const bgGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.48);
  bgGlow.addColorStop(0.0, `rgba(${hue},0.12)`);
  bgGlow.addColorStop(0.35, `rgba(${hue},0.06)`);
  bgGlow.addColorStop(1.0, "rgba(0,0,0,0)");
  ctx.fillStyle = bgGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.48, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(${hue},0.95)`;
  ctx.lineWidth = size * 0.004;
  ctx.shadowColor = `rgba(${hue},0.9)`;
  ctx.shadowBlur = size * 0.018;

  function ring(r, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.004 * width;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function polygon(r, sides, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = rotation + (Math.PI * 2 * i) / sides;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function star(rOuter, rInner, points, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOuter : rInner;
      const a = rotation + (Math.PI * i) / points;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function radialLines(r1, r2, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x1 = cx + Math.cos(a) * r1;
      const y1 = cy + Math.sin(a) * r1;
      const x2 = cx + Math.cos(a) * r2;
      const y2 = cy + Math.sin(a) * r2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function runeDots(r, count, dotR, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgba(${hue},0.98)`;
    ctx.shadowColor = `rgba(${hue},1)`;
    ctx.shadowBlur = size * 0.015;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function runeMarks(r, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.003;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);

      ctx.beginPath();
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(0, size * 0.014);
      ctx.moveTo(-size * 0.008, 0);
      ctx.lineTo(size * 0.008, 0);
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(size * 0.007, -size * 0.022);
      ctx.stroke();

      ctx.restore();
    }
    ctx.restore();
  }

  ring(size * 0.44, 0.55, 1.0);
  ring(size * 0.40, 0.85, 1.45);
  ring(size * 0.34, 0.78, 1.0);
  ring(size * 0.24, 0.95, 1.2);
  ring(size * 0.10, 0.92, 1.0);

  polygon(size * 0.365, 6, -Math.PI / 2, 0.55);
  star(size * 0.30, size * 0.12, 8, -Math.PI / 2, 0.95);
  polygon(size * 0.18, 3, -Math.PI / 2, 0.82);

  radialLines(size * 0.245, size * 0.335, 16, 0, 0.45);
  radialLines(size * 0.11, size * 0.22, 8, Math.PI / 8, 0.55);

  runeDots(size * 0.40, 24, size * 0.0055, 0, 0.9);
  runeMarks(size * 0.285, 12, Math.PI / 12, 0.86);

  const coreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.09);
  coreGlow.addColorStop(0, "rgba(255,255,255,1)");
  coreGlow.addColorStop(0.3, `rgba(${hue},0.95)`);
  coreGlow.addColorStop(1, `rgba(${hue},0)`);
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.09, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 3, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.2, "rgba(200,245,255,1)");
  grad.addColorStop(0.55, "rgba(120,200,255,0.45)");
  grad.addColorStop(1, "rgba(120,200,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

function makeSmokeTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 50);
  grad.addColorStop(0, "rgba(180,225,255,0.72)");
  grad.addColorStop(0.45, "rgba(120,170,255,0.30)");
  grad.addColorStop(0.82, "rgba(120,170,255,0.10)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 50, 0, Math.PI * 2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);
}

const texGlow = makeGlowTexture();
const texSmoke = makeSmokeTexture();

/* ==========
   床グロー
========== */
const floorGlow = new THREE.Mesh(
  new THREE.CircleGeometry(4.5, 96),
  new THREE.MeshBasicMaterial({
    color: 0x8fd3ff,
    transparent: true,
    opacity: 0.10,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
floorGlow.rotation.x = -Math.PI / 2;
floorGlow.position.set(0, -3.44, 0);
world.add(floorGlow);

/* ==========
   二重魔法陣
========== */
const outerMagicTexture = makeMagicCircleTexture(1024, "170,235,255");
const innerMagicTexture = makeMagicCircleTexture(1024, "130,190,255");

const magicCircleOuter = new THREE.Mesh(
  new THREE.CircleGeometry(3.7, 128),
  new THREE.MeshBasicMaterial({
    map: outerMagicTexture,
    transparent: true,
    opacity: 0.94,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
magicCircleOuter.rotation.x = -Math.PI / 2;
magicCircleOuter.position.set(0, -3.30, 0.01);
magicCircleOuter.renderOrder = 10;
world.add(magicCircleOuter);

const magicCircleInner = new THREE.Mesh(
  new THREE.CircleGeometry(2.55, 128),
  new THREE.MeshBasicMaterial({
    map: innerMagicTexture,
    transparent: true,
    opacity: 0.86,
    depthWrite: false,
    side: THREE.DoubleSide,
    blending: THREE.AdditiveBlending
  })
);
magicCircleInner.rotation.x = -Math.PI / 2;
magicCircleInner.position.set(0, -3.27, 0.02);
magicCircleInner.renderOrder = 11;
world.add(magicCircleInner);

/* ==========
   クリスタル
========== */
const crystalGroup = new THREE.Group();
crystalGroup.position.set(0, -1.85, 0);
world.add(crystalGroup);

const crystalCore = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.85, 0),
  new THREE.MeshPhysicalMaterial({
    color: 0xa8e7ff,
    emissive: 0x4ea9ff,
    emissiveIntensity: 1.6,
    roughness: 0.05,
    transmission: 0.15,
    transparent: true,
    opacity: 0.92,
    metalness: 0.12,
    clearcoat: 1.0,
    clearcoatRoughness: 0.04
  })
);
crystalGroup.add(crystalCore);

const crystalInner = new THREE.Mesh(
  new THREE.OctahedronGeometry(0.46, 0),
  new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending
  })
);
crystalGroup.add(crystalInner);

const crystalAura = new THREE.Mesh(
  new THREE.SphereGeometry(1.05, 32, 32),
  new THREE.MeshBasicMaterial({
    color: 0x90d8ff,
    transparent: true,
    opacity: 0.08,
    depthWrite: false,
    blending: THREE.AdditiveBlending
  })
);
crystalGroup.add(crystalAura);


/* ==========
   光リング
========== */
const ringGroup = new THREE.Group();
world.add(ringGroup);

for (let i = 0; i < 3; i++) {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.95 + i * 0.35, 0.02, 12, 90),
    new THREE.MeshBasicMaterial({
      color: i === 0 ? 0xffffff : 0x8fcfff,
      transparent: true,
      opacity: 0.42 - i * 0.08,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = -1.9 + i * 0.5;
  ringGroup.add(ring);
}

/* ==========
   魔力粒子
========== */
const particleGroup = new THREE.Group();
world.add(particleGroup);

const magicParticles = [];

function resetMagicParticle(p, first = false) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 0.35 + Math.random() * 1.1;
  p.userData.angle = angle;
  p.userData.radius = radius;
  p.userData.height = first ? (-3.2 + Math.random() * 5.6) : -3.2;
  p.userData.speed = 0.012 + Math.random() * 0.009;
  p.userData.spin = 0.012 + Math.random() * 0.018;
  p.userData.seed = Math.random() * Math.PI * 2;

  const s = 0.07 + Math.random() * 0.12;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.42 + Math.random() * 0.35;
}

for (let i = 0; i < 90; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texGlow,
    transparent: true,
    opacity: 0.8,
    depthWrite: false,
    color: i % 5 === 0 ? 0xffffff : 0xaee2ff
  });

  const sprite = new THREE.Sprite(mat);
  particleGroup.add(sprite);
  magicParticles.push(sprite);
  resetMagicParticle(sprite, true);
}

function updateMagicParticles(t) {
  for (const p of magicParticles) {
    p.userData.height += p.userData.speed;
    p.userData.angle += p.userData.spin;

    const wobble = Math.sin(t * 2.0 + p.userData.seed) * 0.08;
    const r = p.userData.radius + wobble;

    p.position.x = Math.cos(p.userData.angle) * r;
    p.position.z = Math.sin(p.userData.angle) * r * 0.45;
    p.position.y = p.userData.height;

    p.material.opacity = 0.35 + 0.25 * Math.sin(t * 3.0 + p.userData.seed);

    if (p.userData.height > 2.8) {
      resetMagicParticle(p, false);
    }
  }
}

/* ==========
   浮遊きらめき
========== */
const sparkleGroup = new THREE.Group();
world.add(sparkleGroup);

for (let i = 0; i < 26; i++) {
  const s = new THREE.Mesh(
    new THREE.SphereGeometry(0.02 + Math.random() * 0.02, 8, 8),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.7
    })
  );

  const rr = 2.8 * Math.random();
  const aa = Math.random() * Math.PI * 2;
  const yy = -2.8 + Math.random() * 5.2;

  s.position.set(
    Math.cos(aa) * rr,
    yy,
    Math.sin(aa) * rr * 0.45
  );

  s.userData = {
    baseX: s.position.x,
    baseY: s.position.y,
    baseZ: s.position.z,
    phase: Math.random() * Math.PI * 2
  };

  sparkleGroup.add(s);
}

/* ==========
   霧
========== */
const smokeGroup = new THREE.Group();
world.add(smokeGroup);

const smokeParticles = [];

function resetSmoke(p, first = false) {
  p.position.set(
    (Math.random() - 0.5) * 3.2,
    first ? -3.0 + Math.random() * 1.2 : -3.0,
    (Math.random() - 0.5) * 1.1
  );

  const s = 0.5 + Math.random() * 0.8;
  p.scale.set(s, s, 1);
  p.material.opacity = 0.08 + Math.random() * 0.08;
  p.userData.seed = Math.random() * Math.PI * 2;
}

for (let i = 0; i < 24; i++) {
  const mat = new THREE.SpriteMaterial({
    map: texSmoke,
    transparent: true,
    opacity: 0.12,
    depthWrite: false
  });
  const sp = new THREE.Sprite(mat);
  smokeGroup.add(sp);
  smokeParticles.push(sp);
  resetSmoke(sp, true);
}

function updateSmoke(t) {
  for (const p of smokeParticles) {
    p.position.y += 0.004;
    p.position.x += Math.sin(t * 1.0 + p.userData.seed) * 0.002;
    p.scale.x += 0.0008;
    p.scale.y += 0.0008;
    p.material.opacity -= 0.00035;

    if (p.position.y > -0.8 || p.material.opacity <= 0.02) {
      resetSmoke(p, false);
    }
  }
}

/* ==========
   小クリスタル群
========== */
const shardGroup = new THREE.Group();
world.add(shardGroup);

for (let i = 0; i < 12; i++) {
  const shard = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.14 + Math.random() * 0.12, 0),
    new THREE.MeshPhysicalMaterial({
      color: 0x9edcff,
      emissive: 0x377dff,
      emissiveIntensity: 0.8,
      roughness: 0.12,
      transparent: true,
      opacity: 0.85,
      clearcoat: 1
    })
  );

  const a = (Math.PI * 2 * i) / 12;
  const r = 1.8 + Math.random() * 1.0;
  shard.position.set(
    Math.cos(a) * r,
    -2.5 + Math.random() * 1.8,
    Math.sin(a) * r * 0.36
  );

  shard.userData = {
    baseY: shard.position.y,
    phase: Math.random() * Math.PI * 2,
    rotX: 0.01 + Math.random() * 0.02,
    rotY: 0.01 + Math.random() * 0.02
  };

  shardGroup.add(shard);
}

/* ==========
   録画
========== */
let audioCtx = null;
let audioSourceNode = null;
let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;
let autoStopTimer = null;

async function startAll() {
  try {
    statusEl.textContent = "録画準備中…";

    if (!audioCtx) {
      audioCtx = new AudioContext();
    }
    if (audioCtx.state === "suspended") {
      await audioCtx.resume();
    }

    if (!audioSourceNode) {
      audioSourceNode = audioCtx.createMediaElementSource(bgm);
    }

    const destination = audioCtx.createMediaStreamDestination();
    audioSourceNode.connect(destination);
    audioSourceNode.connect(audioCtx.destination);

    const canvasStream = renderer.domElement.captureStream(60);
    const mixedStream = new MediaStream();

    canvasStream.getVideoTracks().forEach(track => mixedStream.addTrack(track));
    destination.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    let mimeType = "";
    const mimeTypes = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    for (const type of mimeTypes) {
      if (MediaRecorder.isTypeSupported(type)) {
        mimeType = type;
        break;
      }
    }

    mediaRecorder = new MediaRecorder(
      mixedStream,
      mimeType
        ? { mimeType, videoBitsPerSecond: 12000000 }
        : { videoBitsPerSecond: 12000000 }
    );

    recordedChunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "magic_circle_crystal_world.webm";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);

      statusEl.textContent = "保存しました ✨";
      isRecording = false;
    };

    bgm.currentTime = 0;
    bgm.loop = false;
    bgm.volume = 1.0;

    mediaRecorder.start(200);
    await bgm.play();

    isRecording = true;
    statusEl.textContent = "録画中… 3分30秒後に自動保存されます 🎵";

    autoStopTimer = setTimeout(() => {
      stopAll();
    }, RECORD_SECONDS * 1000);

  } catch (err) {
    console.error(err);
    statusEl.textContent = "開始に失敗しました。music.mp3 やブラウザ設定を確認してください";
    startOverlay.classList.remove("hidden");
  }
}

function stopAll() {
  if (!isRecording) return;

  bgm.pause();

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }

  statusEl.textContent = "保存中…";
}

bgm.addEventListener("ended", () => {
  if (isRecording) stopAll();
});

startOverlay.addEventListener("click", async () => {
  startOverlay.classList.add("hidden");
  await startAll();
});

/* ==========
   アニメーション
========== */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateMagicParticles(t);
  updateSmoke(t);

  magicCircleOuter.rotation.z = t * 0.16;
  magicCircleInner.rotation.z = -t * 0.28;

  magicCircleOuter.material.opacity = 0.84 + Math.sin(t * 1.8) * 0.08;
  magicCircleInner.material.opacity = 0.72 + Math.sin(t * 2.2 + 0.8) * 0.10;

  crystalGroup.rotation.y += 0.01;
  crystalCore.rotation.x = Math.sin(t * 0.8) * 0.08;
  crystalCore.rotation.z = Math.cos(t * 0.7) * 0.08;
  crystalGroup.position.y = -1.85 + Math.sin(t * 1.6) * 0.12;

  crystalInner.rotation.y -= 0.018;
  crystalInner.rotation.x += 0.01;

  crystalAura.scale.setScalar(1 + Math.sin(t * 2.0) * 0.05);

  ringGroup.children.forEach((ring, i) => {
    ring.rotation.z = t * (0.35 + i * 0.08) * (i % 2 === 0 ? 1 : -1);
    ring.position.y = -1.95 + i * 0.5 + Math.sin(t * 1.8 + i) * 0.05;
    ring.material.opacity = 0.25 + 0.12 * Math.sin(t * 2.0 + i);
  });

  sparkleGroup.children.forEach((p, i) => {
    p.position.y = p.userData.baseY + Math.sin(t * 1.6 + p.userData.phase) * 0.06;
    p.position.x = p.userData.baseX + Math.cos(t * 1.4 + p.userData.phase) * 0.03;
    p.position.z = p.userData.baseZ + Math.sin(t * 1.2 + p.userData.phase) * 0.02;
    p.material.opacity = 0.35 + 0.3 * Math.sin(t * 2.0 + i);
  });

  shardGroup.children.forEach((s, i) => {
    s.rotation.x += s.userData.rotX;
    s.rotation.y += s.userData.rotY;
    s.position.y = s.userData.baseY + Math.sin(t * 1.5 + s.userData.phase) * 0.08;
  });

  floorGlow.material.opacity = 0.08 + Math.sin(t * 1.5) * 0.03;
  frontMist.material.opacity = 0.04 + Math.sin(t * 0.8) * 0.02;

  pointLight.intensity = 3.1 + Math.sin(t * 2.0) * 0.5;

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
