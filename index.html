<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Magic Circle Triple Colors + Sky Canopy + Mystic BGM</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  }

  canvas {
    display: block;
    position: fixed;
    inset: 0;
  }

  #status {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 50;
    color: #fff;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(0,0,0,0.35);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }

  #startOverlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(80,120,180,0.12), rgba(0,0,0,0.74));
    color: white;
    text-align: center;
    padding: 24px;
    cursor: pointer;
  }

  #startOverlay.hidden {
    display: none;
  }

  #startCard {
    max-width: 760px;
    padding: 24px 28px;
    border-radius: 24px;
    background: rgba(255,255,255,0.10);
    box-shadow: 0 10px 36px rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
  }

  #startCard h1 {
    margin: 0 0 10px;
    font-size: 24px;
  }

  #startCard p {
    margin: 0;
    line-height: 1.8;
    font-size: 14px;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="status">三重魔法陣＋上空天蓋術式を読み込み中…</div>

<div id="startOverlay">
  <div id="startCard">
    <h1>✨ クリックで開始</h1>
    <p>
      左はゴールド、中央はサファイアブルー、右はルビーレッドの三重魔法陣。<br>
      さらに上空には、三つを束ねる巨大な天蓋魔法陣が展開されています。<br>
      クリックすると、神秘BGMつき録画が始まり、3分30秒後に自動保存されます。
    </p>
  </div>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const RECORD_SECONDS = 210;
const statusEl = document.getElementById("status");
const startOverlay = document.getElementById("startOverlay");

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  48,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 3.2, 18.8);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enableRotate = false;
controls.enableZoom = false;
controls.enablePan = false;
controls.target.set(0, -1.25, -6.2);

const loader = new THREE.TextureLoader();

scene.add(new THREE.AmbientLight(0xffffff, 1.22));

const dirLight = new THREE.DirectionalLight(0xe8f4ff, 1.72);
dirLight.position.set(8, 10, 7);
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0xbfd9ff, 0.72);
fillLight.position.set(-9, 4, -7);
scene.add(fillLight);

const upperLight = new THREE.DirectionalLight(0xd6ebff, 0.52);
upperLight.position.set(0, 12, 2);
scene.add(upperLight);

loader.load("sea_bg.png", (texture) => {
  texture.colorSpace = THREE.SRGBColorSpace;
  scene.background = texture;
  statusEl.textContent = "準備OK：中央をクリックで録画開始";
}, undefined, () => {
  scene.background = new THREE.Color(0x03060d);
  statusEl.textContent = "背景画像なしで起動：中央をクリックで録画開始";
});

const frontMist = new THREE.Mesh(
  new THREE.PlaneGeometry(58, 16),
  new THREE.MeshBasicMaterial({
    color: 0x9cc9ff,
    transparent: true,
    opacity: 0.055,
    depthWrite: false
  })
);
frontMist.position.set(0, -4.35, -8.2);
scene.add(frontMist);

const world = new THREE.Group();
world.position.set(0, -0.9, -6.2);
scene.add(world);

function parseHue(hue) {
  const [r, g, b] = hue.split(",").map(v => Number(v.trim()));
  return { r, g, b };
}

function colorFromHue(hue) {
  const { r, g, b } = parseHue(hue);
  return new THREE.Color(r / 255, g / 255, b / 255);
}

function makeMagicCircleTexture(size = 1024, hue = "170,235,255") {
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  const cx = size / 2;
  const cy = size / 2;

  ctx.clearRect(0, 0, size, size);

  const bgGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.48);
  bgGlow.addColorStop(0.0, `rgba(${hue},0.12)`);
  bgGlow.addColorStop(0.35, `rgba(${hue},0.06)`);
  bgGlow.addColorStop(1.0, "rgba(0,0,0,0)");
  ctx.fillStyle = bgGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.48, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = `rgba(${hue},0.95)`;
  ctx.lineWidth = size * 0.004;
  ctx.shadowColor = `rgba(${hue},0.9)`;
  ctx.shadowBlur = size * 0.018;

  function ring(r, alpha = 1, width = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.004 * width;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function polygon(r, sides, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = rotation + (Math.PI * 2 * i) / sides;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function star(rOuter, rInner, points, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const r = i % 2 === 0 ? rOuter : rInner;
      const a = rotation + (Math.PI * i) / points;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  function radialLines(r1, r2, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x1 = cx + Math.cos(a) * r1;
      const y1 = cy + Math.sin(a) * r1;
      const x2 = cx + Math.cos(a) * r2;
      const y2 = cy + Math.sin(a) * r2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function runeDots(r, count, dotR, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = `rgba(${hue},0.98)`;
    ctx.shadowColor = `rgba(${hue},1)`;
    ctx.shadowBlur = size * 0.015;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function runeMarks(r, count, rotation = 0, alpha = 1) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.lineWidth = size * 0.003;
    for (let i = 0; i < count; i++) {
      const a = rotation + (Math.PI * 2 * i) / count;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(a + Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(0, size * 0.014);
      ctx.moveTo(-size * 0.008, 0);
      ctx.lineTo(size * 0.008, 0);
      ctx.moveTo(0, -size * 0.014);
      ctx.lineTo(size * 0.007, -size * 0.022);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  ring(size * 0.44, 0.55, 1.0);
  ring(size * 0.40, 0.85, 1.45);
  ring(size * 0.34, 0.78, 1.0);
  ring(size * 0.24, 0.95, 1.2);
  ring(size * 0.10, 0.92, 1.0);

  polygon(size * 0.365, 6, -Math.PI / 2, 0.55);
  star(size * 0.30, size * 0.12, 8, -Math.PI / 2, 0.95);
  polygon(size * 0.18, 3, -Math.PI / 2, 0.82);

  radialLines(size * 0.245, size * 0.335, 16, 0, 0.45);
  radialLines(size * 0.11, size * 0.22, 8, Math.PI / 8, 0.55);

  runeDots(size * 0.40, 24, size * 0.0055, 0, 0.9);
  runeMarks(size * 0.285, 12, Math.PI / 12, 0.86);

  const coreGlow = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.09);
  coreGlow.addColorStop(0, "rgba(255,255,255,1)");
  coreGlow.addColorStop(0.3, `rgba(${hue},0.95)`);
  coreGlow.addColorStop(1, `rgba(${hue},0)`);
  ctx.fillStyle = coreGlow;
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.09, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.needsUpdate = true;
  return tex;
}

function makeGlowTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 3, 64, 64, 46);
  grad.addColorStop(0, "rgba(255,255,255,1)");
  grad.addColorStop(0.2, "rgba(255,255,255,0.95)");
  grad.addColorStop(0.55, "rgba(255,255,255,0.38)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 46, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeSmokeTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 50);
  grad.addColorStop(0, "rgba(220,235,255,0.68)");
  grad.addColorStop(0.45, "rgba(160,180,255,0.26)");
  grad.addColorStop(0.82, "rgba(140,170,255,0.08)");
  grad.addColorStop(1, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(64, 64, 50, 0, Math.PI * 2);
  ctx.fill();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function makeBeamTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 512;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0.0, "rgba(255,255,255,0)");
  grad.addColorStop(0.12, "rgba(220,240,255,0.48)");
  grad.addColorStop(0.50, "rgba(170,220,255,0.95)");
  grad.addColorStop(0.88, "rgba(220,240,255,0.45)");
  grad.addColorStop(1.0, "rgba(255,255,255,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 128, 512);

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

const texGlow = makeGlowTexture();
const texSmoke = makeSmokeTexture();
const texBeam = makeBeamTexture();

const altarSets = [];

function createMagicCircleSet(config) {
  const {
    x,
    outerHue,
    innerHue,
    glowColor,
    crystalColor,
    emissiveColor,
    auraColor,
    particleColor,
    ringColor,
    rotationScale,
    pulseOffset
  } = config;

  const group = new THREE.Group();
  group.position.x = x;
  world.add(group);

  const floorGlow = new THREE.Mesh(
    new THREE.CircleGeometry(3.5, 96),
    new THREE.MeshBasicMaterial({
      color: glowColor,
      transparent: true,
      opacity: 0.11,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  floorGlow.rotation.x = -Math.PI / 2;
  floorGlow.position.set(0, -3.44, 0);
  group.add(floorGlow);

  const outerMagicTexture = makeMagicCircleTexture(1024, outerHue);
  const innerMagicTexture = makeMagicCircleTexture(1024, innerHue);

  const magicCircleOuter = new THREE.Mesh(
    new THREE.CircleGeometry(3.05, 128),
    new THREE.MeshBasicMaterial({
      map: outerMagicTexture,
      transparent: true,
      opacity: 0.94,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    })
  );
  magicCircleOuter.rotation.x = -Math.PI / 2;
  magicCircleOuter.position.set(0, -3.30, 0.01);
  magicCircleOuter.renderOrder = 10;
  group.add(magicCircleOuter);

  const magicCircleInner = new THREE.Mesh(
    new THREE.CircleGeometry(2.12, 128),
    new THREE.MeshBasicMaterial({
      map: innerMagicTexture,
      transparent: true,
      opacity: 0.86,
      depthWrite: false,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending
    })
  );
  magicCircleInner.rotation.x = -Math.PI / 2;
  magicCircleInner.position.set(0, -3.27, 0.02);
  magicCircleInner.renderOrder = 11;
  group.add(magicCircleInner);

  const crystalGroup = new THREE.Group();
  crystalGroup.position.set(0, -2.0, 0);
  group.add(crystalGroup);

  const crystalCore = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.72, 0),
    new THREE.MeshPhysicalMaterial({
      color: crystalColor,
      emissive: emissiveColor,
      emissiveIntensity: 1.45,
      roughness: 0.05,
      transmission: 0.12,
      transparent: true,
      opacity: 0.92,
      metalness: 0.10,
      clearcoat: 1.0,
      clearcoatRoughness: 0.05
    })
  );
  crystalGroup.add(crystalCore);

  const crystalInner = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.38, 0),
    new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.82,
      blending: THREE.AdditiveBlending
    })
  );
  crystalGroup.add(crystalInner);

  const crystalAura = new THREE.Mesh(
    new THREE.SphereGeometry(0.95, 28, 28),
    new THREE.MeshBasicMaterial({
      color: auraColor,
      transparent: true,
      opacity: 0.08,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    })
  );
  crystalGroup.add(crystalAura);

  const ringGroup = new THREE.Group();
  group.add(ringGroup);

  for (let i = 0; i < 3; i++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.78 + i * 0.28, 0.018, 12, 80),
      new THREE.MeshBasicMaterial({
        color: i === 0 ? 0xffffff : ringColor,
        transparent: true,
        opacity: 0.38 - i * 0.06,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -2.02 + i * 0.42;
    ringGroup.add(ring);
  }

  const particles = [];

  function resetParticle(sprite, first = false) {
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.30 + Math.random() * 0.95;
    sprite.userData.angle = angle;
    sprite.userData.radius = radius;
    sprite.userData.height = first ? (-3.15 + Math.random() * 5.1) : -3.15;
    sprite.userData.speed = 0.010 + Math.random() * 0.008;
    sprite.userData.spin = 0.010 + Math.random() * 0.014;
    sprite.userData.seed = Math.random() * Math.PI * 2;

    const s = 0.05 + Math.random() * 0.09;
    sprite.scale.set(s, s, 1);
    sprite.material.opacity = 0.38 + Math.random() * 0.28;
  }

  for (let i = 0; i < 34; i++) {
    const mat = new THREE.SpriteMaterial({
      map: texGlow,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
      color: i % 6 === 0 ? 0xffffff : particleColor
    });

    const sprite = new THREE.Sprite(mat);
    group.add(sprite);
    particles.push(sprite);
    resetParticle(sprite, true);
  }

  const shards = [];
  for (let i = 0; i < 8; i++) {
    const shard = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.10 + Math.random() * 0.08, 0),
      new THREE.MeshPhysicalMaterial({
        color: crystalColor,
        emissive: emissiveColor,
        emissiveIntensity: 0.75,
        roughness: 0.12,
        transparent: true,
        opacity: 0.82,
        clearcoat: 1
      })
    );

    const a = (Math.PI * 2 * i) / 8;
    const r = 1.25 + Math.random() * 0.6;
    shard.position.set(
      Math.cos(a) * r,
      -2.5 + Math.random() * 1.4,
      Math.sin(a) * r * 0.34
    );

    shard.userData = {
      baseY: shard.position.y,
      phase: Math.random() * Math.PI * 2,
      rotX: 0.008 + Math.random() * 0.018,
      rotY: 0.008 + Math.random() * 0.018
    };

    group.add(shard);
    shards.push(shard);
  }

  const light = new THREE.PointLight(glowColor, 2.2, 22, 2);
  light.position.set(0, -1.15, 0.1);
  group.add(light);

  return {
    group,
    floorGlow,
    magicCircleOuter,
    magicCircleInner,
    crystalGroup,
    crystalCore,
    crystalInner,
    crystalAura,
    ringGroup,
    particles,
    resetParticle,
    shards,
    light,
    rotationScale,
    pulseOffset
  };
}

altarSets.push(
  createMagicCircleSet({

);

altarSets.push(

altarSets.push(

const skyTemple = new THREE.Group();
skyTemple.position.set(0, 5.9, -0.7);
world.add(skyTemple);

const skyGlowBase = new THREE.Mesh(

skyGlowBase.rotation.x = -1.14;

const skyMagicMain = new THREE.Mesh(

skyTemple.add(skyMagicMain);

const skyMagicInner = new THREE.Mesh(

  new THREE.MeshBasicMaterial({

  })

skyMagicInner.rotation.x = -1.14;

skyTemple.add(skyMagicInner);

const skyMagicCore = new THREE.Mesh(
  new THREE.CircleGeometry(6.8, 160),
  new THREE.MeshBasicMaterial({

  })

skyMagicCore.rotation.x = -1.14;

const skyHaloRing1 = new THREE.Mesh(
  new THREE.TorusGeometry(10.8, 0.08, 16, 180),
  new THREE.MeshBasicMaterial({

function createNoiseBuffer(ctx, duration = 2.0) {
  const bufferSize = Math.floor(ctx.sampleRate * duration);
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * 0.45;
  }
  return buffer;
}

function makeImpulseResponse(ctx, seconds = 2.8, decay = 2.4) {
  const length = Math.floor(ctx.sampleRate * seconds);
  const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const channel = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      const n = Math.random() * 2 - 1;
      channel[i] = n * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

function sectionAtTime(elapsedSec) {
  const total = BGM_SECTIONS.reduce((sum, sec) => sum + sec.bars * sec.chordDur, 0);
  let wrapped = elapsedSec % total;
  for (let i = 0; i < BGM_SECTIONS.length; i++) {
    const secLen = BGM_SECTIONS[i].bars * BGM_SECTIONS[i].chordDur;
    if (wrapped < secLen) {
      return { section: BGM_SECTIONS[i], sectionIndex: i, localTime: wrapped };
    }
    wrapped -= secLen;
  }
  return { section: BGM_SECTIONS[0], sectionIndex: 0, localTime: 0 };
}

  const limiter = audioCtx.createDynamicsCompressor();
  limiter.threshold.value = -18;
  limiter.knee.value = 8;
  limiter.ratio.value = 10;
  limiter.attack.value = 0.003;
  limiter.release.value = 0.25;

  audioMaster.connect(limiter);
  limiter.connect(audioCtx.destination);
  limiter.connect(audioDestination);

  const noiseBuffer = createNoiseBuffer(audioCtx, 3.0);
  const reverb = audioCtx.createConvolver();

function startMysticBGM() {
  if (!audioNodes || bgmStarted) return;
  const now = audioCtx.currentTime;
  audioNodes.startTime = now;
  nextChordTime = now + 0.12;
  currentSectionIndex = 0;

  audioNodes.droneGain.gain.cancelScheduledValues(now);
  audioNodes.drone2Gain.gain.cancelScheduledValues(now);
  audioNodes.drone3Gain.gain.cancelScheduledValues(now);
  audioNodes.airGain.gain.cancelScheduledValues(now);
  audioNodes.sparkleGain.gain.cancelScheduledValues(now);

  audioNodes.droneGain.gain.setValueAtTime(0.0001, now);
  audioNodes.droneGain.gain.exponentialRampToValueAtTime(0.045, now + 4.0);
  audioNodes.drone2Gain.gain.setValueAtTime(0.0001, now);
  audioNodes.drone2Gain.gain.exponentialRampToValueAtTime(0.028, now + 5.0);
  audioNodes.drone3Gain.gain.setValueAtTime(0.0001, now);
  audioNodes.drone3Gain.gain.exponentialRampToValueAtTime(0.014, now + 6.0);
  audioNodes.airGain.gain.setValueAtTime(0.0001, now);
  audioNodes.airGain.gain.exponentialRampToValueAtTime(0.013, now + 6.5);
  audioNodes.sparkleGain.gain.setValueAtTime(0.0001, now);
  audioNodes.sparkleGain.gain.exponentialRampToValueAtTime(0.006, now + 7.5);

  if (musicSchedulerId) clearInterval(musicSchedulerId);
  musicSchedulerId = setInterval(scheduleMusicAhead, 220);
  scheduleMusicAhead();

  bgmStarted = true;
}

function stopMysticBGM() {
  if (!audioNodes) return;
  const now = audioCtx.currentTime;
  for (const g of [audioNodes.droneGain.gain, audioNodes.drone2Gain.gain, audioNodes.drone3Gain.gain, audioNodes.airGain.gain, audioNodes.sparkleGain.gain]) {
    g.cancelScheduledValues(now);
    g.setValueAtTime(Math.max(g.value, 0.0001), now);
    g.exponentialRampToValueAtTime(0.0001, now + 1.8);
  }
  if (musicSchedulerId) {
    clearInterval(musicSchedulerId);
    musicSchedulerId = null;
  }
  bgmStarted = false;
}

function playChordPad(freqs, time, duration = 3.8, level = 0.04) {
  freqs.forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    osc.type = idx === 0 ? "sine" : (idx === 1 ? "triangle" : "sine");
    osc.frequency.setValueAtTime(freq, time);

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 900 + idx * 180;
    filter.Q.value = 0.5;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(level / (1 + idx * 0.35), time + 0.7);
    gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioNodes.bgmBus);

    osc.start(time);
    osc.stop(time + duration + 0.1);
  });
}

function playMagicSE(intensity = 1, color = "blue") {

  osc2.type = "sine";
  osc2.frequency.setValueAtTime(tone.base * 0.5, now);
  osc2.frequency.exponentialRampToValueAtTime(tone.base * 1.5, now + 1.1 * intensity);

  const gain1 = audioCtx.createGain();
  gain1.gain.setValueAtTime(0.0001, now);
  gain1.gain.exponentialRampToValueAtTime(0.040 * intensity, now + 0.04);
  gain1.gain.exponentialRampToValueAtTime(0.0001, now + 1.45 * intensity);

  const gain2 = audioCtx.createGain();
  gain2.gain.setValueAtTime(0.0001, now);
  gain2.gain.exponentialRampToValueAtTime(0.022 * intensity, now + 0.07);
  gain2.gain.exponentialRampToValueAtTime(0.0001, now + 1.6 * intensity);

  const filter1 = audioCtx.createBiquadFilter();
  filter1.type = "bandpass";
  filter1.frequency.value = tone.top * 0.7;
  filter1.Q.value = 2.4;

  osc1.connect(filter1);
  filter1.connect(gain1);
  gain1.connect(audioNodes.fxBus);

  osc2.connect(gain2);
  gain2.connect(audioNodes.fxBus);

  const noise = audioCtx.createBufferSource();
  noise.buffer = createNoiseBuffer(audioCtx, 0.8);

  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = "bandpass";
  noiseFilter.frequency.value = tone.noise;
  noiseFilter.Q.value = 0.9;

  const noiseGain = audioCtx.createGain();
  noiseGain.gain.setValueAtTime(0.0001, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.015 * intensity, now + 0.02);
  noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.65 * intensity);

  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioNodes.fxBus);

  osc1.start(now);
  osc2.start(now);
  noise.start(now);

  osc1.stop(now + 1.55 * intensity);
  osc2.stop(now + 1.75 * intensity);
  noise.stop(now + 0.72 * intensity);

function playCelestialBell(kind = "blue", volume = 0.42, time = null) {
  if (!audioCtx || !audioNodes) return;

  const now = time ?? audioCtx.currentTime;
  const noteMap = {
    gold: [783.99, 1174.66, 1567.98],
    blue: [659.25, 987.77, 1318.51],
    red:  [587.33, 880.00, 1174.66],
    sky:  [880.00, 1318.51, 1760.00]
  };
  const notes = noteMap[kind] || noteMap.blue;

  notes.forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    osc.type = idx === 0 ? "sine" : "triangle";
    osc.frequency.setValueAtTime(freq, now + idx * 0.02);

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, now + idx * 0.02);
    gain.gain.exponentialRampToValueAtTime(volume / (idx + 1) * 0.03, now + idx * 0.03 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 2.8 + idx * 0.08);

    const filter = audioCtx.createBiquadFilter();
    filter.type = "highpass";
    filter.frequency.value = 420;

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioNodes.fxBus);

    osc.start(now + idx * 0.02);
    osc.stop(now + 2.9 + idx * 0.1);
  });
}

function scheduleMusicAhead() {
  if (!audioCtx || !bgmStarted) return;
  const scheduleAhead = 1.8;

  while (nextChordTime < audioCtx.currentTime + scheduleAhead) {
    const elapsed = nextChordTime - audioNodes.startTime;
    const { section, sectionIndex, localTime } = sectionAtTime(elapsed);
    currentSectionIndex = sectionIndex;

    const chordIndex = Math.floor(localTime / section.chordDur) % section.chords.length;
    const chordRatios = section.chords[chordIndex];
    const freqs = chordRatios.map(r => section.root * r);

    playChordPad(freqs, nextChordTime, section.chordDur * 0.96, 0.043 + sectionIndex * 0.004);

    const arpPattern = [2, 1, 0, 1, 2, 1, 0, 2];
    for (let i = 0; i < arpPattern.length; i++) {
      const stepTime = nextChordTime + i * (section.chordDur / arpPattern.length);
      if (Math.random() < section.arpDensity) {
        const octave = i % 3 === 0 ? 2 : 1;
        const freq = freqs[arpPattern[i] % freqs.length] * octave;
        playArpNote(freq, stepTime, 0.85 + Math.random() * 0.25, 0.013 + Math.random() * 0.006);
      }
      if (i % 4 === 0) {
        playSubPulse(freqs[0] * 0.5, stepTime, 0.55, 0.010 + sectionIndex * 0.002);
      }
    }

    const absoluteBar = Math.floor(elapsed / section.chordDur);
    const bellColor = section.colorCycle[chordIndex % section.colorCycle.length];
    if (absoluteBar % section.bellEvery === 0) {
      playCelestialBell(bellColor, 0.34 + sectionIndex * 0.04, nextChordTime + 0.18);
    }

    nextChordTime += section.chordDur;
  }
}

async function startAll() {
  try {
    statusEl.textContent = "録画準備中…";

    initAudioSystem();

    if (audioCtx.state === "suspended") {
      await audioCtx.resume();
    }

    startMysticBGM();
    playMagicSE(1.1, "sky");

    const canvasStream = renderer.domElement.captureStream(60);
    const mixedStream = new MediaStream();

    canvasStream.getVideoTracks().forEach(track => mixedStream.addTrack(track));
    audioDestination.stream.getAudioTracks().forEach(track => mixedStream.addTrack(track));

    let mimeType = "";
    const mimeTypes = [
      "video/webm;codecs=vp9,opus",
      "video/webm;codecs=vp8,opus",
      "video/webm"
    ];
    for (const type of mimeTypes) {
      if (MediaRecorder.isTypeSupported(type)) {
        mimeType = type;
        break;
      }
    }

    mediaRecorder = new MediaRecorder(
      mixedStream,
      mimeType
        ? { mimeType, videoBitsPerSecond: 12000000 }
        : { videoBitsPerSecond: 12000000 }
    );

    recordedChunks = [];

    mediaRecorder.ondataavailable = (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    };

    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: "video/webm" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "magic_circle_triple_colors_sky_canopy_mystic_bgm.webm";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);

      statusEl.textContent = "保存しました ✨";
      isRecording = false;
    };

    mediaRecorder.start(200);

    isRecording = true;
    statusEl.textContent = "録画中… 3分30秒後に自動保存されます 🎵";

    autoStopTimer = setTimeout(() => {
      stopAll();
    }, RECORD_SECONDS * 1000);

  } catch (err) {
    console.error(err);
    statusEl.textContent = "開始に失敗しました。ブラウザ設定を確認してください";
    startOverlay.classList.remove("hidden");
  }
}

function stopAll() {
  if (!isRecording) return;

  stopMysticBGM();
  playMagicSE(0.9, "sky");

  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    setTimeout(() => {
      mediaRecorder.stop();
    }, 1300);
  }

  if (autoStopTimer) {
    clearTimeout(autoStopTimer);
    autoStopTimer = null;
  }

  statusEl.textContent = "保存中…";
}

startOverlay.addEventListener("click", async () => {
  startOverlay.classList.add("hidden");
  await startAll();
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  updateSmoke(t);

  altarSets.forEach((set, setIndex) => {
    const tt = t + set.pulseOffset;

    set.magicCircleOuter.rotation.z = tt * 0.16 * set.rotationScale;
    set.magicCircleInner.rotation.z = -tt * 0.28 * set.rotationScale;

    set.magicCircleOuter.material.opacity = 0.82 + Math.sin(tt * 1.8) * 0.08;
    set.magicCircleInner.material.opacity = 0.70 + Math.sin(tt * 2.2 + 0.8) * 0.10;

    set.floorGlow.material.opacity = 0.08 + Math.sin(tt * 1.5) * 0.03;

    set.crystalGroup.rotation.y += 0.01;
    set.crystalCore.rotation.x = Math.sin(tt * 0.8) * 0.08;
    set.crystalCore.rotation.z = Math.cos(tt * 0.7) * 0.08;
    set.crystalGroup.position.y = -2.0 + Math.sin(tt * 1.6) * 0.12;

    set.crystalInner.rotation.y -= 0.018;
    set.crystalInner.rotation.x += 0.01;
    set.crystalAura.scale.setScalar(1 + Math.sin(tt * 2.0) * 0.05);

    set.ringGroup.children.forEach((ring, i) => {
      ring.rotation.z = tt * (0.36 + i * 0.08) * (i % 2 === 0 ? 1 : -1);
      ring.position.y = -2.06 + i * 0.42 + Math.sin(tt * 1.8 + i) * 0.05;
      ring.material.opacity = 0.22 + 0.11 * Math.sin(tt * 2.0 + i);
    });

    for (const p of set.particles) {
      p.userData.height += p.userData.speed;
      p.userData.angle += p.userData.spin;

      const wobble = Math.sin(tt * 2.0 + p.userData.seed) * 0.08;
      const r = p.userData.radius + wobble;

      p.position.x = Math.cos(p.userData.angle) * r;
      p.position.z = Math.sin(p.userData.angle) * r * 0.45;
      p.position.y = p.userData.height;

      p.material.opacity = 0.30 + 0.24 * Math.sin(tt * 3.0 + p.userData.seed);

      if (p.userData.height > 2.45) {
        set.resetParticle(p, false);
      }
    }

    set.shards.forEach((s) => {
      s.rotation.x += s.userData.rotX;
      s.rotation.y += s.userData.rotY;
      s.position.y = s.userData.baseY + Math.sin(tt * 1.45 + s.userData.phase) * 0.08;
    });

    set.light.intensity = 1.95 + Math.sin(tt * 2.0 + setIndex) * 0.35;
  });

  skyMagicMain.rotation.z = t * 0.045;
  skyMagicInner.rotation.z = -t * 0.075;
  skyMagicCore.rotation.z = t * 0.11;

  skyMagicMain.material.opacity = 0.24 + Math.sin(t * 1.1) * 0.04;
  skyMagicInner.material.opacity = 0.15 + Math.sin(t * 1.4 + 0.8) * 0.03;
  skyMagicCore.material.opacity = 0.11 + Math.sin(t * 1.8 + 1.2) * 0.025;

  skyGlowBase.material.opacity = 0.065 + Math.sin(t * 0.9) * 0.018;
  skyMist.material.opacity = 0.035 + Math.sin(t * 0.7 + 0.5) * 0.015;

  skyHaloRing1.rotation.y = t * 0.12;
  skyHaloRing1.rotation.z = Math.sin(t * 0.6) * 0.08;
  skyHaloRing1.material.opacity = 0.14 + Math.sin(t * 1.3) * 0.03;

  skyHaloRing2.rotation.y = -t * 0.16;
  skyHaloRing2.rotation.z = 0.28 + Math.sin(t * 0.8) * 0.06;
  skyHaloRing2.material.opacity = 0.09 + Math.sin(t * 1.0 + 0.6) * 0.03;

  skyCrownArc.rotation.y = Math.sin(t * 0.4) * 0.1;
  skyCrownArc.material.opacity = 0.16 + Math.sin(t * 1.7 + 0.2) * 0.04;

  skyRays.forEach((beam, i) => {
    beam.material.opacity = (i === 0 ? 0.12 : 0.06) + Math.sin(t * 1.4 + i) * (i === 0 ? 0.025 : 0.015);
    beam.scale.x = 1 + Math.sin(t * 1.2 + i * 1.5) * 0.08;
    beam.position.y = (i === 0 ? -2.3 : -2.0) + Math.sin(t * 0.9 + i) * 0.12;
  });

  skySigilDots.forEach((dot, i) => {
    dot.position.y = dot.userData.baseY + Math.sin(t * 1.7 + dot.userData.phase + i * 0.2) * 0.10;
    dot.material.opacity = 0.38 + Math.sin(t * 2.2 + i) * 0.14;
  });

  skyStarsGroup.children.forEach((star, i) => {
    star.position.x = star.userData.baseX + Math.cos(t * star.userData.drift + star.userData.phase) * 0.18;
    star.position.y = star.userData.baseY + Math.sin(t * (star.userData.drift + 0.25) + star.userData.phase) * 0.12;
    star.position.z = star.userData.baseZ + Math.sin(t * 0.45 + i * 0.3) * 0.06;
    star.material.opacity = 0.20 + 0.30 * Math.sin(t * 1.8 + i);
  });

  sparkleGroup.children.forEach((p, i) => {
    p.position.y = p.userData.baseY + Math.sin(t * 1.6 + p.userData.phase) * 0.06;
    p.position.x = p.userData.baseX + Math.cos(t * 1.4 + p.userData.phase) * 0.03;
    p.position.z = p.userData.baseZ + Math.sin(t * 1.2 + p.userData.phase) * 0.02;
    p.material.opacity = 0.34 + 0.3 * Math.sin(t * 2.0 + i);
  });

  frontMist.material.opacity = 0.035 + Math.sin(t * 0.8) * 0.018;

  if (audioCtx && isRecording) {
    const wave = Math.sin(t * 0.45);
    const wave2 = Math.sin(t * 0.31 + 1.2);
    const wave3 = Math.sin(t * 0.19 + 2.4);

    if (audioNodes) {
      const now = audioCtx.currentTime;
      audioNodes.drone.frequency.setTargetAtTime(82.4 + wave * 2.2, now, 0.5);
      audioNodes.drone2.frequency.setTargetAtTime(123.47 + wave2 * 3.6, now, 0.65);
      audioNodes.drone3.frequency.setTargetAtTime(164.81 + wave3 * 2.0, now, 0.8);

      const sparkleAmt = 0.004 + (Math.sin(t * 0.8) + 1) * 0.0018;
      audioNodes.sparkleGain.gain.setTargetAtTime(sparkleAmt, now, 0.9);
      const airAmt = 0.010 + (Math.sin(t * 0.33 + 0.4) + 1) * 0.002;
      audioNodes.airGain.gain.setTargetAtTime(airAmt, now, 1.2);
    }

    const beat = Math.sin(t * 0.72) + Math.sin(t * 1.11 + 0.8);
    if (beat > 1.72 && t - lastMagicTrigger > 6.0) {
      lastMagicTrigger = t;
      const sequence = ["gold", "blue", "red"];
      const color = sequence[Math.floor((t / 6.0)) % sequence.length];
      playMagicSE(0.75, color);
    }

    if (t - lastBellTime > 13.0) {
      lastBellTime = t;
      const bellSequence = ["blue", "gold", "red", "sky"];
      const kind = bellSequence[Math.floor(t / 13.0) % bellSequence.length];
      playCelestialBell(kind, 0.28);
    }

    if (Math.sin(t * 0.22 + 0.8) > 0.9985 && t - lastMagicTrigger > 3.0) {
      lastMagicTrigger = t;
      playMagicSE(1.05, "sky");
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});
</script>
